function saveRecording(studentId) {
  var title = (document.getElementById('rec-title')||{}).value || '';
  var url   = (document.getElementById('rec-url')  ||{}).value || '';
  var desc  = (document.getElementById('rec-desc')  ||{}).value || '';
  var rd    = (document.getElementById('rec-date-d') ||{}).value || '';
  var rm    = (document.getElementById('rec-date-m') ||{}).value || '';
  var ry    = (document.getElementById('rec-date-y') ||{}).value || '';
  var date  = (rd && rm && ry) ? ry+'-'+rm+'-'+rd : '';
  if (!title.trim()) return tst('El título es requerido', 1);
  if (!url.trim())   return tst('El link del video es requerido', 1);
  var btn = document.getElementById('rec-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
  sb.from('recordings_1on1').insert({
    student_id:  studentId,
    title:       title.trim(),
    video_url:   url.trim(),
    description: desc.trim() || null,
    recorded_at: date ? new Date(date).toISOString() : new Date().toISOString()
  }).then(function(r) {
    if (r.error) { tst('Error: '+r.error.message, 1); if(btn){btn.disabled=false;btn.textContent='Guardar grabación';} return; }
    tst('✓ Grabación guardada');
    var m = document.getElementById('recording-modal');
    if (m) m.remove();
  });
}




function dStudent(id) {
  if (!confirm('¿Eliminar este alumno permanentemente?\n\nEsto eliminará su perfil. Para eliminarlo completamente también debes ir a:\nSupabase → Authentication → Users → eliminar el email manualmente.')) return;
  sb.from('profiles').delete().eq('id', id).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst('✓ Perfil eliminado. Recuerda eliminar también en Auth → Users');
    rAdmSt();
  });
}
function activateMember(id, isActive) {
  var msg = isActive ? '¿Desactivar membresía de este alumno?' : '¿Activar membresía por 6 meses?';
  if (!confirm(msg)) return;
  var update = isActive
    ? { membership_end: new Date(Date.now() - 1000).toISOString() }
    : { membership_start: new Date().toISOString(), membership_end: new Date(Date.now() + 180*86400000).toISOString() };
  sb.from('profiles').update(update).eq('id', id).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst(isActive ? 'Membresía desactivada' : '✓ Membresía activada — 6 meses');
    rAdmSt();
  });
}
function cSt() {
  var n=document.getElementById('a-n').value.trim(),e=document.getElementById('a-e').value.trim(),p=document.getElementById('a-p').value;
  if(!n||!e||!p) return tst('Completa todos los campos',1);

function openEditModal(type, data, parentLvId, parentModId) {
  var existing = document.getElementById('edit-modal');
  if (existing) existing.remove();

  var isNew = !data;
  var title = isNew
    ? (type==='level' ? '+ Nuevo nivel' : type==='module' ? '+ Nuevo módulo' : '+ Nueva clase')
    : (type==='level' ? '✎ Editar nivel' : type==='module' ? '✎ Editar módulo' : '✎ Editar clase');

  var modal = document.createElement('div');
  modal.id = 'edit-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);overflow-y:auto;';

  var box = document.createElement('div');

function closeEditModal() {

async function saveEditModal(type, data, parentLvId, parentModId) {
  var btn = document.getElementById('em-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  var title = (document.getElementById('em-title')||{}).value || '';
  if (!title.trim()) { tst('El título es requerido', 1); if(btn){btn.disabled=false;btn.textContent='Guardar cambios';} return; }

  if (type === 'level') {
    var thumbnailUrl = data ? (data.thumbnail_url || '') : '';
    var fileInput = document.getElementById('em-img-file');
    var file = fileInput && fileInput.files[0];
    if (file) {
      tst('Subiendo imagen...');
      var ext = file.name.split('.').pop();
      var path = 'levels/' + (data ? data.id : Date.now()) + '_' + Date.now() + '.' + ext;
      var up = await sb.storage.from('course-images').upload(path, file, { upsert: true });
      if (up.error) { tst('Error imagen: ' + up.error.message, 1); if(btn){btn.disabled=false;btn.textContent='Guardar cambios';} return; }
      thumbnailUrl = sb.storage.from('course-images').getPublicUrl(path).data.publicUrl;
    }
    var payload = {
      title: title.trim(),
      description: (document.getElementById('em-desc')||{}).value || '',
      thumbnail_url: thumbnailUrl,
      sort_order: parseInt((document.getElementById('em-ord')||{}).value) || 1,
      is_published: (document.getElementById('em-pub')||{}).checked !== false,
    };
    var q = data ? sb.from('course_levels').update(payload).eq('id', data.id) : sb.from('course_levels').insert(payload);
    q.then(function(r) {
      if (r.error) { tst('Error: '+r.error.message, 1); if(btn){btn.disabled=false;btn.textContent='Guardar cambios';} return; }
      tst(data ? '✓ Nivel actualizado' : '✓ Nivel creado');
      closeEditModal(); loadAdmLevels();
    });

  } else if (type === 'module') {
    var lvId = data ? data.level_id : parentLvId;
    if (!lvId) { tst('Sin nivel asignado', 1); return; }
    var payload2 = {
      title: title.trim(),
      description: (document.getElementById('em-desc')||{}).value || '',
      sort_order: parseInt((document.getElementById('em-ord')||{}).value) || 1,
      level_id: lvId,
    };
    var q2 = data ? sb.from('course_modules').update(payload2).eq('id', data.id) : sb.from('course_modules').insert(payload2);
    q2.then(function(r) {
      if (r.error) { tst('Error: '+r.error.message, 1); if(btn){btn.disabled=false;btn.textContent='Guardar cambios';} return; }
      tst(data ? '✓ Módulo actualizado' : '✓ Módulo creado');
      closeEditModal(); loadAdmLevels();
    });

  } else if (type === 'lesson') {
    var modId = (data && data.module_id) ? data.module_id : parentModId;
    if (!modId) { tst('Sin módulo asignado', 1); return; }

    // Handle thumbnail upload/delete for lesson
    var lesThumbUrl = data ? (data.thumbnail_url || '') : '';
    var lesThumbDel = (document.getElementById('em-thumb-del')||{}).checked;
    if (lesThumbDel) {
      // Also delete from storage
      if (data && data.thumbnail_url) {
        var oldPath = data.thumbnail_url.split('/course-images/')[1];
        if (oldPath) sb.storage.from('course-images').remove([oldPath]);
      }
      lesThumbUrl = null;
    } else {
      var lesThumbFile = document.getElementById('em-thumb-file');
      var lesThumbFileObj = lesThumbFile && lesThumbFile.files && lesThumbFile.files[0];
      if (lesThumbFileObj) {
        tst('Subiendo miniatura...');
        var lesExt = lesThumbFileObj.name.split('.').pop();
        var lesPath = 'lessons/' + (data ? data.id : Date.now()) + '_' + Date.now() + '.' + lesExt;
        var lesUp = await sb.storage.from('course-images').upload(lesPath, lesThumbFileObj, { upsert: true });
        if (lesUp.error) { tst('Error miniatura: ' + lesUp.error.message, 1); if(btn){btn.disabled=false;btn.textContent='Guardar cambios';} return; }
        lesThumbUrl = sb.storage.from('course-images').getPublicUrl(lesPath).data.publicUrl;
      }
    }

    var hasTask = (document.getElementById('em-task')||{}).checked;
    var payload3 = {
      title: title.trim(),
      thumbnail_url: lesThumbUrl || null,
      video_url: (document.getElementById('em-url')||{}).value.trim() || '',
      description: (document.getElementById('em-desc')||{}).value || '',
      duration_minutes: parseInt((document.getElementById('em-min')||{}).value) || null,
      sort_order: parseInt((document.getElementById('em-ord')||{}).value) || 1,
      is_published: (document.getElementById('em-pub')||{}).checked !== false,
      has_task: hasTask,
      task_instructions: hasTask ? ((document.getElementById('em-task-ins')||{}).value || '') : null,
      module_id: modId,
    };
    var q3 = data ? sb.from('course_lessons').update(payload3).eq('id', data.id) : sb.from('course_lessons').insert(payload3);
    q3.then(function(r) {
      if (r.error) { tst('Error: '+r.error.message, 1); if(btn){btn.disabled=false;btn.textContent='Guardar cambios';} return; }
      tst(data ? '✓ Clase actualizada' : '✓ Clase creada');
      closeEditModal(); loadAdmLevels();
    });
  }
}

function genCode() {
  var note = document.getElementById('code-note').value.trim();
  var months = parseInt(document.getElementById('code-months').value) || 6;
  var plan = document.getElementById('code-plan') ? document.getElementById('code-plan').value : 'formacion';
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code = 'KATANA-';
  for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  sb.from('access_codes').insert({
    code: code,
    created_by: cUser.id,
    months: months,
    plan: plan,
    notes: note
  }).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst('✓ Código generado: ' + code);
    loadCodes();
  });
}

  if (!confirm('¿Eliminar este código de acceso?')) return;
  sb.from('access_codes').delete().eq('id', id).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst('✓ Código eliminado');

function loadCodes() {
  var c = document.getElementById('codes-list'); if (!c) return;
  sb.from('access_codes').select('*').order('created_at', {ascending: false}).then(function(r) {
    if (!r.data || !r.data.length) { c.innerHTML = '<p style="color:#555;font-size:.82rem;">Sin códigos generados aún.</p>'; return; }
    var tbl = document.createElement('table'); tbl.className = 'dtab';
    tbl.innerHTML = '<thead><tr><th>Código</th><th>Nota</th><th>Meses</th><th>Estado</th><th>Usado</th><th></th></tr></thead>';
    var tb = document.createElement('tbody');
    r.data.forEach(function(cd) {
      var tr = document.createElement('tr');
      var usedDate = cd.used_at ? new Date(cd.used_at).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) : '—';
      tr.innerHTML =
        '<td><span style="font-family:monospace;font-size:.82rem;color:#f0f0f0;letter-spacing:1px;">' + cd.code + '</span>' +
        '<button onclick="navigator.clipboard.writeText(\'' + cd.code + '\').then(function(){tst(\'✓ Copiado\')})" style="background:none;border:none;color:#555;cursor:pointer;font-size:.7rem;margin-left:6px;padding:2px 5px;border:1px solid var(--br);border-radius:3px;">Copiar</button></td>' +
        '<td style="font-size:.74rem;color:#666;">' + (cd.notes || '—') + '</td>' +
        '<td style="font-size:.74rem;">' + cd.months + '</td>' +
        '<td><span style="font-size:.68rem;padding:2px 8px;border-radius:3px;background:' + (cd.is_used ? 'rgba(248,113,113,.1)' : 'rgba(74,222,128,.1)') + ';color:' + (cd.is_used ? '#f87171' : '#4ade80') + ';">' + (cd.is_used ? 'Usado' : 'Disponible') + '</span></td>' +
        '<td style="font-size:.74rem;color:#555;">' + usedDate + '</td>' +
        '<td></td>';
      if (!cd.is_used) {
        var delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.style.cssText = 'background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.18);color:#f87171;padding:3px 9px;border-radius:2px;font-size:.71rem;cursor:pointer;';
        delBtn.addEventListener('click', function() { dCode(cd.id); });
        tr.cells[tr.cells.length-1].appendChild(delBtn);
      }
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);
    c.innerHTML = '';
    var w = document.createElement('div'); w.className = 'dtab-wrap'; w.appendChild(tbl); c.appendChild(w);
  });
}

    var t = document.getElementById('se-t'); if (!t) return;
    if (!r.data || !r.data.length) {
      t.innerHTML = '<p style="color:#555;padding:14px 0;font-size:.82rem;">Sin sesiones.</p>';
      return;
    }

    t.innerHTML = '';
    var now = new Date();

    // Split into upcoming and past
    var upcoming = r.data.filter(function(s){ return new Date(s.scheduled_at) >= now || s.is_active; });
    var past     = r.data.filter(function(s){ return new Date(s.scheduled_at) < now && !s.is_active; });

    // ── Render a paginated list into a container ──
    function renderPaginatedList(container, items, pageSize) {
      var page = 0;
      function render() {
        var slice = items.slice(0, (page + 1) * pageSize);
        var hasMore = items.length > slice.length;
        container.innerHTML = '';
        slice.forEach(function(s) {
          var card = document.createElement('div');
          card.id = 'ses-card-' + s.id;
          card.style.cssText = 'background:rgba(255,255,255,.02);border:1px solid var(--br);border-radius:10px;padding:14px;margin-bottom:10px;';
          var dateStr = new Date(s.scheduled_at).toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
          var timeStr = new Date(s.scheduled_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
          card.innerHTML =
            '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;">' +
              '<div>' +
                '<div style="font-size:.86rem;font-weight:600;color:#f0f0f0;">' + (s.title||'') + '</div>' +
                '<div style="font-size:.72rem;color:#555;margin-top:2px;">' + dateStr + ' · ' + timeStr + '</div>' +
                (s.description ? '<div style="font-size:.72rem;color:#666;margin-top:2px;">' + s.description + '</div>' : '') +
              '</div>' +
              '<label style="cursor:pointer;display:flex;align-items:center;gap:5px;font-size:.72rem;color:' + (s.is_active?'#4ade80':'#555') + ';flex-shrink:0;">' +
                '<input type="checkbox" ' + (s.is_active?'checked':'') + ' data-id="' + s.id + '" onchange="togSe(this.dataset.id, this.checked)"> ' +
                (s.is_active ? 'Activo' : 'Inactivo') +
              '</label>' +
            '</div>' +
            '<div style="margin-bottom:10px;">' +
              '<label class="al">URL Grabación (YouTube)</label>' +
              '<div style="display:flex;gap:8px;">' +
                '<input id="rec-' + s.id + '" class="ai" style="flex:1;" placeholder="https://youtube.com/embed/..." value="' + (s.recording_url||'') + '">' +
                '<button onclick="saveRec(this.dataset.id)" data-id="' + s.id + '" style="background:rgba(91,127,166,.12);border:1px solid rgba(91,127,166,.25);color:var(--sl);padding:6px 12px;border-radius:6px;font-size:.72rem;cursor:pointer;white-space:nowrap;">Guardar</button>' +
              '</div>' +
            '</div>' +
            '<div style="display:flex;gap:8px;">' +
              '<button onclick="openEditSe(this.dataset.id)" data-id="' + s.id + '" style="flex:1;background:rgba(91,127,166,.1);border:1px solid rgba(91,127,166,.2);color:var(--sl);padding:6px;border-radius:6px;font-size:.72rem;cursor:pointer;">✎ Editar</button>' +
              '<button onclick="dSe(this.dataset.id)" data-id="' + s.id + '" style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.18);color:#f87171;padding:6px 12px;border-radius:6px;font-size:.72rem;cursor:pointer;">✕</button>' +
            '</div>';
          container.appendChild(card);
        });
        // Ver más button
        var oldBtn = container.querySelector('.ses-more-btn');
        if (oldBtn) oldBtn.remove();
        if (hasMore) {
          var btn = document.createElement('button');
          btn.className = 'ses-more-btn';
          btn.textContent = 'Ver 5 más ↓';
          btn.style.cssText = 'width:100%;padding:10px;margin-top:4px;background:rgba(91,127,166,.08);border:1px solid rgba(91,127,166,.2);color:var(--sl);border-radius:8px;font-size:.78rem;cursor:pointer;';
          btn.addEventListener('click', function(){ page++; render(); });
          container.appendChild(btn);
        }
      }
      render();
    }

    // ── PRÓXIMAS SESIONES ──
    var upcomingWrap = document.createElement('div');
    upcomingWrap.style.cssText = 'margin-bottom:20px;';
    var upcomingLabel = document.createElement('div');
    upcomingLabel.style.cssText = 'font-size:.68rem;color:#9a9a9a;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--br);';
    upcomingLabel.textContent = 'Próximas sesiones';
    upcomingWrap.appendChild(upcomingLabel);
    if (upcoming.length) {
      renderPaginatedList(upcomingWrap, upcoming, 5);
    } else {
      var empty = document.createElement('div');
      empty.style.cssText = 'color:#555;font-size:.8rem;padding:10px 0;';
      empty.textContent = 'Sin sesiones próximas.';
      upcomingWrap.appendChild(empty);
    }
    t.appendChild(upcomingWrap);

    // ── SESIONES PASADAS (colapsable) ──
    var pastWrap = document.createElement('div');
    var pastHeader = document.createElement('div');
    pastHeader.style.cssText = 'display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 0;border-top:1px solid var(--br);margin-bottom:0;';
    pastHeader.innerHTML =
      '<div style="font-size:.68rem;color:#555;text-transform:uppercase;letter-spacing:1.5px;">Sesiones pasadas / grabaciones (' + past.length + ')</div>' +
      '<svg id="past-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5" style="transition:.2s;"><path d="M6 9l6 6 6-6"/></svg>';
    var pastList = document.createElement('div');
    pastList.id = 'past-ses-list';
    pastList.style.display = 'none';
    pastHeader.addEventListener('click', function() {
      var open = pastList.style.display !== 'none';
      pastList.style.display = open ? 'none' : 'block';
      var arrow = document.getElementById('past-arrow');
      if (arrow) arrow.style.transform = open ? '' : 'rotate(180deg)';
      if (!open && !pastList.dataset.loaded) {
        pastList.dataset.loaded = '1';
        renderPaginatedList(pastList, past, 5);
      }
    });
    pastWrap.appendChild(pastHeader);
    pastWrap.appendChild(pastList);
    t.appendChild(pastWrap);
  });
}

function saveRec(id) {
  var recId = typeof id === 'string' ? id : id;
  var val = (document.getElementById('rec-' + recId)||{}).value || '';
  id = recId;
  sb.from('live_sessions').update({ recording_url: val.trim() || null }).eq('id', id).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst('✓ Grabación guardada');
  });
}

function openEditSe(id) {
  sb.from('live_sessions').select('*').eq('id', id).single().then(function(r) {
    if (!r.data) return;
    var s = r.data;
    var existing = document.getElementById('edit-se-modal');
    if (existing) existing.remove();

    // Format datetime for input
    var dt = new Date(s.scheduled_at);
    var pad = function(n){ return String(n).padStart(2,'0'); };
    var localDt = dt.getFullYear() + '-' + pad(dt.getMonth()+1) + '-' + pad(dt.getDate()) + 'T' + pad(dt.getHours()) + ':' + pad(dt.getMinutes());
    var endDt = s.end_time ? new Date(s.end_time) : null;
    var localEndDt = endDt ? endDt.getFullYear() + '-' + pad(endDt.getMonth()+1) + '-' + pad(endDt.getDate()) + 'T' + pad(endDt.getHours()) + ':' + pad(endDt.getMinutes()) : '';

    var overlay = document.createElement('div');
    overlay.id = 'edit-se-modal';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);';
    overlay.innerHTML =
      '<div style="background:#1a1e26;border:1px solid rgba(91,127,166,.25);border-radius:16px;width:100%;max-width:480px;padding:24px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">' +
          '<div style="font-size:.92rem;font-weight:700;">✎ Editar sesión</div>' +
          '<button onclick="var m=document.getElementById(\'edit-se-modal\');if(m)m.remove();" style="background:none;border:none;color:#555;font-size:1.2rem;cursor:pointer;">✕</button>' +
        '</div>' +
        '<div style="margin-bottom:9px;">' +
          '<label class="al">Título</label><input id="es-t" class="ai" value="' + (s.title||'') + '">' +
        '</div>' +
        '<div class="ses-dt-grid" style="margin-bottom:10px;">' +
          '<div><label class="al">Inicio</label><input id="es-d" type="datetime-local" class="ai ses-dt-input" value="' + localDt + '"></div>' +
          '<div><label class="al">Fin (auto-desactivar)</label><input id="es-end" type="datetime-local" class="ai ses-dt-input" value="' + localEndDt + '"></div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;">' +
          '<div><label class="al">Link Discord</label><input id="es-u" class="ai" value="' + (s.discord_url||'') + '"></div>' +
          '<div><label class="al">Descripción</label><input id="es-desc" class="ai" value="' + (s.description||'') + '"></div>' +
        '</div>' +
        '<div style="display:flex;gap:10px;margin-top:6px;">' +
          '<button id="es-save-btn" onclick="saveSe(this.dataset.id)" data-id="' + s.id + '" class="abtn2" style="flex:1;padding:10px;">Guardar cambios</button>' +
          '<button onclick="var m=document.getElementById(\'edit-se-modal\');if(m)m.remove();" style="background:transparent;border:1px solid var(--br);color:#555;padding:10px 16px;border-radius:7px;font-size:.84rem;cursor:pointer;">Cancelar</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
  });
}

function saveSe(id) {
  var t = (document.getElementById('es-t')||{}).value || '';
  var d = (document.getElementById('es-d')||{}).value || '';
  if (!t || !d) return tst('Título y fecha requeridos', 1);
  var btn = document.getElementById('es-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
  var endV = (document.getElementById('es-end')||{}).value || '';
  sb.from('live_sessions').update({
    title: t.trim(),
    scheduled_at: new Date(d).toISOString(),
    end_time: endV ? new Date(endV).toISOString() : null,
    discord_url: (document.getElementById('es-u')||{}).value.trim() || '',
    description: (document.getElementById('es-desc')||{}).value.trim() || '',
  }).eq('id', id).then(function(r) {
    if (r.error) { tst('Error: ' + r.error.message, 1); if(btn){btn.disabled=false;btn.textContent='Guardar cambios';} return; }
    tst('✓ Sesión actualizada');
    var m = document.getElementById('edit-se-modal');
    if (m) m.remove();
    rAdmSe();
  });
}

function cSe() {
  var t = document.getElementById('s-t').value.trim();
  var d = document.getElementById('s-d').value;
  if (!t || !d) return tst('Título y fecha requeridos', 1);
  var endVal = document.getElementById('s-end').value;
  sb.from('live_sessions').insert({
    title: t,
    scheduled_at: new Date(d).toISOString(),
    end_time: endVal ? new Date(endVal).toISOString() : null,
    discord_url: document.getElementById('s-u').value.trim(),
    description: document.getElementById('s-desc').value.trim(),
    is_active: document.getElementById('s-act').checked,
    recording_url: null,
  }).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst('✓ Programada');
    document.getElementById('s-t').value = '';
    document.getElementById('s-d').value = '';
    document.getElementById('s-u').value = '';
    document.getElementById('s-desc').value = '';
    document.getElementById('s-act').checked = false;
    rAdmSe();
  });
}

function togSe(id, v) {
  sb.from('live_sessions').update({
    is_active: v,
    manually_deactivated: v ? false : true
  }).eq('id', id).then(function() {
    tst(v ? '✓ Sesión activada' : 'Sesión desactivada');
    rAdmSe();
  });
}

function dSe(id) {
  if (!confirm('¿Eliminar esta sesión?')) return;
  sb.from('live_sessions').delete().eq('id', id).then(function() {
    tst('Eliminada'); rAdmSe();
  });
}


function toggleActMenu(btn) {
  document.querySelectorAll('.act-menu').forEach(function(m) {
    if (m !== btn.nextElementSibling) m.style.display = 'none';
  });
  var menu = btn.nextElementSibling;
  if (!menu) return;
  if (menu.style.display !== 'none') { menu.style.display = 'none'; return; }

  // Render offscreen to measure
  menu.style.cssText = menu.style.cssText + ';position:fixed;visibility:hidden;display:block;top:-9999px;left:-9999px;';
  var menuH = menu.offsetHeight || 88;
  var menuW = menu.offsetWidth  || 150;

  var rect      = btn.getBoundingClientRect();
  // Mobile nav bar is 58px; add 8px safety margin
  var safeBottom = window.innerHeight - (window.innerWidth <= 860 ? 68 : 12);
  var spaceBelow = safeBottom - rect.bottom;
  var top  = spaceBelow >= menuH + 4 ? rect.bottom + 4 : rect.top - menuH - 4;
  var left = Math.max(8, Math.min(rect.right - menuW, window.innerWidth - menuW - 8));

  menu.style.top        = top  + 'px';
  menu.style.left       = left + 'px';
  menu.style.visibility = 'visible';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest || (!e.target.closest('.act-menu') && !(e.target.getAttribute('onclick') && e.target.getAttribute('onclick').includes('toggleActMenu')))) {
    document.querySelectorAll('.act-menu').forEach(function(m){ m.style.display='none'; });
  }
});

function tst(m, err) {
  var t = document.getElementById('tst');
  t.textContent = m;
  t.className = 'toast2 show' + (err ? ' err' : '');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ── PULL TO REFRESH ──
(function() {
  var PTR_THRESHOLD = 80;   // px to pull before triggering reload
  var PTR_MAX       = 120;  // max visual pull distance

  var el        = null;  // #appdash — set after DOM ready
  var indicator = null;
  var label     = null;
  var startY    = 0;
  var pulling   = false;
  var triggered = false;
  var currentPull = 0;

  function init() {
    el        = document.getElementById('appdash');
    indicator = document.getElementById('ptr-indicator');
    label     = document.getElementById('ptr-label');
    if (!el || !indicator) return;

    el.addEventListener('touchstart', onTouchStart, { passive: true });
    el.addEventListener('touchmove',  onTouchMove,  { passive: false });
    el.addEventListener('touchend',   onTouchEnd,   { passive: true });
  }

  function onTouchStart(e) {
    // Only activate when already scrolled to the very top
    if (el.scrollTop > 2) return;
    startY   = e.touches[0].clientY;
    pulling  = true;
    triggered = false;
    currentPull = 0;
  }

  function onTouchMove(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - startY;
    if (dy <= 0) { pulling = false; resetIndicator(); return; }
    // Only cancel native scroll when we're pulling down from top
    if (el.scrollTop <= 2 && dy > 0) {
      e.preventDefault(); // prevent native scroll interference
    }
    currentPull = Math.min(dy * 0.5, PTR_MAX); // dampen
    setIndicatorHeight(currentPull);

    if (currentPull >= PTR_THRESHOLD) {
      indicator.classList.add('ptr-ready');
      label.textContent = 'Suelta para recargar';
      triggered = true;
    } else {
      indicator.classList.remove('ptr-ready');
      label.textContent = 'Baja para recargar';
      triggered = false;
    }
  }

  function onTouchEnd() {
    if (!pulling) return;
    pulling = false;
    if (triggered) {
      // Show loading state briefly then reload
      indicator.classList.add('ptr-loading');
      label.textContent = 'Recargando...';
      setIndicatorHeight(56);
      setTimeout(function() { location.reload(); }, 400);
    } else {
      resetIndicator();
    }
  }

  function setIndicatorHeight(h) {
    if (!indicator) return;
    indicator.style.height = h + 'px';
    var inner = document.getElementById('ptr-inner');
    if (inner) inner.style.opacity = Math.min(h / PTR_THRESHOLD, 1).toString();
  }

  function resetIndicator() {
    if (!indicator) return;
    indicator.style.height = '0';
    indicator.classList.remove('ptr-ready','ptr-loading');
    var inner = document.getElementById('ptr-inner');
    if (inner) inner.style.opacity = '0';
    currentPull = 0;
    triggered   = false;
  }

  // Init after DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

    'Housing': {

    },
    'Durable Goods': {
      up:      '📈 USD sube · 📈 SP500/NQ suben — Demanda industrial fuerte, bueno para empresas.',
      down:    '📉 USD baja · 📉 SP500/NQ bajan — Caída en pedidos industriales, señal negativa.',
      neutral: '➡️ Sin cambio relevante.'
    },
    'Consumer Confidence': {

      down:    '📉 USD baja · 📉 SP500/NQ/US30 bajan · 📈 Oro sube — Consumidores pesimistas, posible desaceleración.',
      neutral: '➡️ Confianza en línea con expectativas.'
    },
    'ADP': {
      up:      '📈 USD sube · Índices reacción mixta — Empleo privado fuerte, puede anticipar buen NFP.',
      down:    '📉 USD baja · 📈 Índices pueden subir — Empleo privado débil, posibles recortes de tasas.',
      neutral: '➡️ Sin movimiento claro.'
    },
    'default': {
      up:      '📈 Dato mayor al pronóstico — generalmente positivo para USD, revisar impacto en índices y oro según contexto.',
      down:    '📉 Dato menor al pronóstico — generalmente negativo para USD, posible beneficio para oro e índices.',
      neutral: '➡️ Dato en línea con expectativas, impacto neutral.'
    },
  };

  function getExplanation(name) {
    for (var key in explanations) {
      if (key !== 'default' && name.toLowerCase().indexOf(key.toLowerCase()) >= 0) {
        return explanations[key];
      }
    }
    return explanations['default'];
  }

  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var todayDow = dayNames[new Date().getDay()];

  // Load overrides quickly then render — if overrides arrive before calendar, great
  // If not, calendar renders first and overrides patch it when ready
  window._calOverrides = window._calOverrides || {};
  sb.from('cal_overrides').select('event_name,event_date,actual_value').then(function(ov) {
    window._calOverrides = {};
    if (ov.data) ov.data.forEach(function(o) {
      window._calOverrides[o.event_date + '|' + o.event_name] = o.actual_value;
    });
    // If calendar already rendered, patch the Real values in DOM
    Object.keys(window._calOverrides).forEach(function(key) {
      var val = window._calOverrides[key];
      var els = document.querySelectorAll('[data-cal-key="' + key + '"]');
      els.forEach(function(el) { el.textContent = val; el.className = 'cal-val-num cal-actual'; });
    });
  });

  fetch('/api/calendar').then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      if (!data.ok || !data.events || !data.events.length) {
    // Keep previous data if available
    if (c.querySelector('.cal-event')) return;
        c.innerHTML = '<div class="cal-empty">📅 Sin noticias de alto impacto esta semana.</div>';
        return;
      }

      // Filter USD only
      var usdEvents = data.events.filter(function(ev) {
        return ev.currency === 'USD';
      });

      if (!usdEvents.length) {
        c.innerHTML = '<div class="cal-empty">📅 Sin noticias USD de alto impacto esta semana.</div>';
        return;
      }

      // Group by date
      var groups = {}, order = [];
      usdEvents.forEach(function(ev) {
        var d = ev.date || 'Sin fecha';
        if (!groups[d]) { groups[d] = []; order.push(d); }
        groups[d].push(ev);
      });

      var html = '';
      order.forEach(function(date) {
        var isToday = date.indexOf(todayDow) === 0;
        html += '<div class="cal-day-group">';
        html += '<div class="cal-day-header"><span class="cal-day-name">' + date + '</span>';
        if (isToday) html += '<span class="cal-day-today">HOY</span>';
        html += '</div>';

        groups[date].forEach(function(ev, idx) {
          var curr     = ev.currency || '';
          var meta     = currMeta[curr] || { flag: '<img src="https://flagcdn.com/24x18/un.png" width="24" height="18" style="border-radius:2px;vertical-align:middle;" alt="">', color: '#9a9a9a' };
          var hasAct   = ev.actual && ev.actual !== '—';
          var isSoft   = !ev.time || ev.time === 'Todo el día' || ev.time === 'Tentativo';
          var expl     = getExplanation(ev.name);
          var uid      = 'cal-' + date.replace(/[^a-z0-9]/gi,'') + '-' + idx;

          // Better/worse
          var actualClass = 'cal-actual';
          // Apply manual override if exists
          if (window._calOverrides && window._calOverrides[ev.isoDate + '|' + ev.name]) {
            ev.actual = window._calOverrides[ev.isoDate + '|' + ev.name];
            hasAct = true;
          }

          if (hasAct && ev.forecast && ev.forecast !== '—') {
            var a = parseFloat(ev.actual), f = parseFloat(ev.forecast);
            if (!isNaN(a) && !isNaN(f)) actualClass += a >= f ? ' better' : ' worse';
          }

          html += '<div class="cal-event' + (hasAct ? ' cal-released' : '') + '" data-uid="' + uid + '" onclick="toggleCalExplain(this.dataset.uid)">';

          // Time
          html += '<div class="cal-time' + (isSoft ? ' cal-soft' : '') + '">' + ev.time + '</div>';

          // Flag only (no currency text)
          html += '<div class="cal-flag-wrap"><div class="cal-flag">' + meta.flag + '</div></div>';

          // Name + badge inline
          html += '<div><div class="cal-name" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' + ev.name + '<span class="cal-impact-badge">🔴 <span class="cal-impact-text">Alto impacto</span></span></div></div>';

          // Values — always show all 3 columns
          html += '<div class="cal-values">';
          // Real — always visible, shows "—" if not published yet
          html += '<div class="cal-val">';
          html += '<div class="cal-val-label">Real</div>';
          if (hasAct) {
            html += '<div class="cal-val-num ' + actualClass + '" data-cal-key="' + ev.isoDate + '|' + ev.name + '">' + ev.actual + '</div>';
          } else {
            html += '<div class="cal-val-num cal-pending" data-cal-key="' + ev.isoDate + '|' + ev.name + '">—</div>';
          }
          html += '</div>';
          // Forecast
          html += '<div class="cal-val"><div class="cal-val-label">Pronós</div><div class="cal-val-num">' + (ev.forecast !== '—' ? ev.forecast : '—') + '</div></div>';
          // Previous
          html += '<div class="cal-val"><div class="cal-val-label">Previo</div><div class="cal-val-num">' + (ev.previous !== '—' ? ev.previous : '—') + '</div></div>';
          // Admin edit button inside values row
          if (cProfile && cProfile.role === 'admin') {
            html += '<button onclick="event.stopPropagation();editCalReal(this.dataset.name,this.dataset.date,this.dataset.val)" ' +
              'data-name="' + ev.name.replace(/"/g,"'") + '" data-date="' + ev.isoDate + '" data-val="' + (ev.actual||'') + '" ' +
              'style="background:rgba(91,127,166,.08);border:1px solid rgba(91,127,166,.18);color:var(--sl);padding:2px 8px;border-radius:4px;font-size:.62rem;cursor:pointer;align-self:center;">✎</button>';
          }
          html += '</div>';

          // Explanation panel (hidden by default, shown on click)
          html += '<div class="cal-explain" id="' + uid + '">';
          html += '<div style="font-size:.7rem;font-weight:700;color:var(--sl);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">¿Qué significa este dato?</div>';
          html += '<div class="cal-explain-row"><span class="cal-explain-icon">🟢</span><span><strong>Si sale MAYOR al pronóstico:</strong> ' + expl.up + '</span></div>';
          html += '<div class="cal-explain-row"><span class="cal-explain-icon">🔴</span><span><strong>Si sale MENOR al pronóstico:</strong> ' + expl.down + '</span></div>';
          html += '<div class="cal-explain-row"><span class="cal-explain-icon">⚪</span><span><strong>Si sale IGUAL al pronóstico:</strong> ' + expl.neutral + '</span></div>';
          html += '</div>';

          html += '</div>'; // .cal-event
        });
        html += '</div>'; // .cal-day-group
      });

      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">';
      html += '<div style="font-size:.63rem;color:#333;">Toca una noticia para ver su impacto en el mercado</div>';
      html += '<a href="https://www.forexfactory.com/calendar" target="_blank" rel="noopener" style="font-size:.63rem;color:#444;text-decoration:none;display:inline-flex;align-items:center;gap:4px;">';
      html += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
      html += 'ForexFactory</a></div>';

      c.innerHTML = html;
    })
    .catch(function(err) {
      c.innerHTML = '<div class="cal-error"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>No se pudo cargar el calendario. Intenta más tarde.</div>';
      console.error('Calendar error:', err);
    });
}

// ── AUTO SESSION ACTIVATOR ──
// Runs every 30 seconds — activates sessions when start time is reached,
// deactivates when end_time passes or manually toggled
function checkSessionTimes() {
  var now = new Date();
  sb.from('live_sessions').select('id, scheduled_at, end_time, is_active, manually_deactivated').then(function(r) {
    if (!r.data) return;
    r.data.forEach(function(s) {
      var start = new Date(s.scheduled_at);
      var end   = s.end_time ? new Date(s.end_time) : null;

      // Should be active: start <= now AND (no end OR now < end)
      var shouldBeActive = start <= now && (!end || now < end);
      // Should be inactive: end exists AND now >= end
      var shouldBeInactive = end && now >= end;

      if (shouldBeActive && !s.is_active && s.manually_deactivated !== true) {
        // Auto-activate only if not manually deactivated
        sb.from('live_sessions').update({ is_active: true }).eq('id', s.id).then(function() {
          var cur = history.state;
          if (cur && cur.section === 'sesiones') rSes();
        });
      } else if (shouldBeInactive && s.is_active) {
        // Auto-deactivate by end_time
        sb.from('live_sessions').update({ is_active: false, manually_deactivated: false }).eq('id', s.id).then(function() {
          var cur = history.state;
          if (cur && cur.section === 'sesiones') rSes();
        });
      }
    });
  });
}

// Start checker when user is logged in
function startSessionChecker() {
  checkSessionTimes(); // run immediately
  setInterval(checkSessionTimes, 30000); // then every 30 seconds
}

function editCalReal(name, isoDate, currentVal) {
  var existing = document.getElementById('cal-edit-modal');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'cal-edit-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';
  overlay.innerHTML =
    '<div style="background:#1a1e26;border:1px solid rgba(91,127,166,.25);border-radius:14px;width:100%;max-width:360px;padding:24px;">' +
      '<div style="font-size:.9rem;font-weight:700;color:#f0f0f0;margin-bottom:6px;">✎ Editar valor Real</div>' +
      '<div style="font-size:.75rem;color:#555;margin-bottom:16px;">' + name + ' · ' + isoDate + '</div>' +
      '<label class="al">Valor Real</label>' +
      '<input id="cal-real-input" class="ai" value="' + (currentVal||'') + '" placeholder="Ej: 3.2%" style="margin-bottom:14px;">' +
      '<div style="display:flex;gap:8px;">' +
        '<button id="cal-real-save" class="abtn2" style="flex:1;padding:10px;">Guardar</button>' +
        '<button onclick="var m=document.getElementById(\'cal-edit-modal\');if(m)m.remove();" style="background:transparent;border:1px solid var(--br);color:#555;padding:10px 14px;border-radius:7px;font-size:.82rem;cursor:pointer;">Cancelar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);

  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });

  document.getElementById('cal-real-save').addEventListener('click', function() {
    var val = document.getElementById('cal-real-input').value.trim();
    this.disabled = true; this.textContent = 'Guardando...';
    sb.from('cal_overrides').upsert({
      event_name: name,
      event_date: isoDate,
      actual_value: val,
      updated_at: new Date().toISOString()
    }, { onConflict: 'event_name,event_date' }).then(function(r) {
      if (r.error) { tst('Error: ' + r.error.message, 1); return; }
      tst('✓ Valor actualizado');
      overlay.remove();
      // Clear calendar cache and reload
      window._calCache = null;
      loadCalendar();
    });
  });
}

function toggleCalExplain(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
}
