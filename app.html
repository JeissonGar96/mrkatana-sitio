<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script>
// SPA router bootstrap: if loaded via a deep link (/app/clases/l/xxx),
// store the path so window.onload can restore it, then redirect to root.
(function() {
  var path = window.location.pathname;
  if (path && path.indexOf('/app/') === 0 && path !== '/app/') {
    // Store intended route for restoration after redirect
    try { sessionStorage.setItem('spa_redirect', path); } catch(e){}
  }
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Katana | App</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:sans-serif;background:#111;color:#f0f0f0;overflow-x:hidden;}
:root{--st:#5b7fa6;--sl:#7da0c8;--bc:#1e1e1e;--bm:#181818;--br:rgba(255,255,255,.07);--bs:rgba(91,127,166,.25);}





/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.overlay.open{display:flex;}
.mbox{background:linear-gradient(160deg,rgba(10,13,18,1),rgba(12,16,22,1));border:1px solid rgba(91,127,166,.2);box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 30px 80px rgba(0,0,0,.7);border-radius:20px;width:100%;max-width:420px;overflow:hidden;animation:minc .3s ease;}
@keyframes minc{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.mhed{padding:20px 24px;display:flex;justify-content:center;align-items:center;border-bottom:1px solid rgba(91,127,166,.12);background:linear-gradient(90deg,rgba(10,13,18,1),rgba(12,16,22,1));position:relative;}
.mhed img{height:44px;}
.mcls{position:absolute;right:16px;top:50%;transform:translateY(-50%);}
.mcls{background:none;border:none;color:#555;font-size:1.3rem;cursor:pointer;padding:2px 8px;border-radius:2px;}
.mcls:hover{color:#f0f0f0;}
.mbody{padding:26px 24px;background:rgba(11,14,20,1);}
.mtabs{display:flex;margin-bottom:22px;border:1px solid var(--br);border-radius:2px;overflow:hidden;}
.mtab{flex:1;padding:9px;text-align:center;font-size:.81rem;font-weight:500;cursor:pointer;color:#555;background:transparent;border:none;font-family:sans-serif;transition:all .2s;}
.mtab.on{background:rgba(91,127,166,.13);color:var(--sl);}
.msg{border-radius:2px;padding:9px 12px;font-size:.77rem;margin-bottom:12px;display:none;}
.msg.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:#f87171;}
.msg.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:.66rem;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.fi{width:100%;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid var(--br);border-radius:2px;color:#f0f0f0;font-family:sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--st);}
.fi::placeholder{color:rgba(154,154,154,.35);}
.mbtnn{width:100%;padding:12px;background:var(--st);color:#fff;border:none;border-radius:8px;font-family:sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:2px;}
.mbtnn:hover{background:var(--sl);}
.mbtnn:disabled{opacity:.5;cursor:not-allowed;}

/* APP */
#appdash{display:none;position:fixed;inset:0;background:#111;z-index:500;overflow-y:auto;scrollbar-width:none;overscroll-behavior-y:contain;}
/* Pull-to-refresh indicator */
#ptr-indicator{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  height:0;overflow:hidden;
  background:linear-gradient(to bottom,rgba(17,17,17,1),rgba(17,17,17,.0));
  transition:height .2s ease;
  pointer-events:none;
}
#ptr-inner{
  display:flex;align-items:center;gap:8px;
  font-size:.72rem;color:var(--sl);
  letter-spacing:1px;text-transform:uppercase;
  opacity:0;transition:opacity .2s;
}
#ptr-spinner{
  width:16px;height:16px;
  border:2px solid rgba(91,127,166,.25);
  border-top-color:var(--sl);
  border-radius:50%;
}
@keyframes ptr-spin{ to{ transform:rotate(360deg) } }
#ptr-indicator.ptr-loading #ptr-spinner{ animation:ptr-spin .7s linear infinite; }
#ptr-indicator.ptr-ready #ptr-inner{ opacity:1; }
#appdash::-webkit-scrollbar{display:none;}
@media(max-width:860px){
  #appdash{padding-bottom:58px;}
}
.anav{background:rgba(17,17,17,.99);border-bottom:1px solid var(--br);padding:13px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.anav img{height:30px;}
.alay{display:flex;min-height:calc(100vh - 61px);}
.aside{width:210px;flex-shrink:0;background:#181818;border-right:1px solid var(--br);padding:18px 0;}
.snav{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:2px;color:#9a9a9a;font-size:.83rem;background:transparent;border:none;cursor:pointer;transition:all .2s;margin-bottom:1px;text-align:left;font-family:sans-serif;}
.snav svg{flex-shrink:0;opacity:.7;transition:opacity .2s;}
.snav:hover svg,.snav.on svg{opacity:1;}
.snav:hover{background:rgba(255,255,255,.04);color:#f0f0f0;}
.snav.on{background:rgba(91,127,166,.12);color:var(--sl);}
.amain{flex:1;padding:30px;}
.atit{font-family:var(--font-cond,sans-serif);font-size:1.7rem;font-weight:800;text-transform:uppercase;margin-bottom:5px;}
.asub{font-size:.82rem;color:#555;margin-bottom:26px;}
.acard{background:var(--bc);border:1px solid var(--br);border-radius:14px;padding:20px;position:relative;overflow:hidden;}
.acard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--st);}
.acard-v{font-family:var(--font-cond,sans-serif);font-size:2.3rem;font-weight:800;color:var(--sl);line-height:1;}
.acard-l{font-size:.7rem;color:#555;margin-top:3px;text-transform:uppercase;}
.acard-s{font-size:.75rem;color:#9a9a9a;margin-top:4px;}
.mc{background:var(--bc);border:1px solid var(--br);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:7px;transition:border-color .2s;}
.mc:hover{border-color:var(--bs);}
.md{background:rgba(91,127,166,.1);border:1px solid var(--bs);border-radius:2px;padding:8px 10px;text-align:center;min-width:48px;flex-shrink:0;}
.md-d{font-family:var(--font-cond,sans-serif);font-size:1.4rem;font-weight:800;color:var(--sl);line-height:1;}
.md-m{font-size:.6rem;color:#555;text-transform:uppercase;}
.sec{font-size:.68rem;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--br);}
.spin{width:14px;height:14px;border:2px solid rgba(91,127,166,.2);border-top-color:var(--st);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
.logbtn{background:transparent;border:1px solid var(--br);color:#555;padding:6px 13px;border-radius:2px;font-family:sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s;}
.logbtn:hover{border-color:#f87171;color:#f87171;}
.clcard{background:var(--bc);border:1px solid var(--br);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;}
.clcard:hover{border-color:var(--bs);transform:translateY(-2px);}

/* ── COURSE SYSTEM ── */
.course-back{display:inline-flex;align-items:center;gap:7px;color:#555;font-size:.76rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-bottom:20px;transition:color .2s;border:none;background:none;padding:0;}
.course-back:hover{color:var(--sl);}
.empty-state{color:#444;font-size:.84rem;padding:40px;text-align:center;}

/* Level grid */
.lvl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;margin-top:20px;}
.lvl-card{
  background:linear-gradient(160deg,rgba(255,255,255,.05) 0%,rgba(91,127,166,.08) 30%,rgba(15,20,28,.92) 70%,rgba(91,127,166,.04) 100%);
  border:1px solid rgba(91,127,166,.2);
  border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s;
  box-shadow:0 1px 0 rgba(255,255,255,.07) inset,0 4px 16px rgba(0,0,0,.4);
}
.lvl-card:hover{
  border-color:rgba(91,127,166,.4);
  transform:translateY(-3px);
  box-shadow:0 1px 0 rgba(255,255,255,.1) inset,0 12px 32px rgba(0,0,0,.5);
}
.lvl-thumb{height:160px;background-size:cover;background-position:center;position:relative;}
.lvl-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.7));}
.lvl-info{padding:18px;}
.lvl-title{font-family:var(--font-cond,sans-serif);font-size:1.05rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f0f0f0;margin-bottom:6px;}
.lvl-desc{font-size:.78rem;color:#666;line-height:1.5;margin-bottom:12px;}
.lvl-meta{font-size:.72rem;color:var(--sl);letter-spacing:.5px;}

/* Module grid */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:20px;}
.mod-card{background:var(--bc);border:1px solid var(--br);border-radius:12px;padding:20px;cursor:pointer;transition:all .25s;}
.mod-card:hover{border-color:var(--bs);transform:translateY(-2px);}
.mod-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.mod-icon{width:40px;height:40px;background:rgba(91,127,166,.12);border:1px solid rgba(91,127,166,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--sl);}
.mod-meta-top{font-size:.7rem;color:#555;text-align:right;}
.mod-title{font-size:.92rem;font-weight:600;color:#f0f0f0;margin-bottom:6px;}
.mod-desc{font-size:.76rem;color:#666;line-height:1.5;margin-bottom:16px;}
.mod-progress{margin-top:auto;}
.mod-progress-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:6px;}
.mod-progress-fill{height:100%;background:linear-gradient(90deg,var(--st),var(--sl));border-radius:2px;transition:width .5s ease;}
.mod-progress-label{font-size:.7rem;color:#555;}


/* ── LESSON SIDEBAR — Teachable style ── */
.lesson-layout {
  display: flex;
  height: calc(100vh - 130px);
  min-height: 500px;
  overflow: hidden;
  border-radius: 12px;
  border: 1px solid rgba(91,127,166,.2);
  background: #111418;
  box-shadow: 0 4px 24px rgba(0,0,0,.4);
}
.lesson-sidebar {
  width: 300px;
  min-width: 300px;
  flex-shrink: 0;
  border-right: 1px solid rgba(91,127,166,.15);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: #111418;
  border-radius: 12px 0 0 12px;
}
.lesson-sidebar::-webkit-scrollbar { width: 4px; }
.lesson-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }
.lesson-sidebar-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--br);
  background: rgba(0,0,0,.2);
  position: sticky; top: 0; z-index: 2;
}
.lesson-main {
  flex: 1;
  overflow-y: auto;
  background: #0f1318;
  border-radius: 0 12px 12px 0;
  min-width: 0;
}
.lesson-main::-webkit-scrollbar { width: 4px; }
.lesson-main::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

/* Module sections in sidebar */
.ls-module-section { border-bottom: 1px solid rgba(255,255,255,.05); }
.ls-module-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: background .15s;
  user-select: none;
}
.ls-module-header:hover { background: rgba(255,255,255,.03); }
.ls-module-header.active { background: rgba(91,127,166,.06); }
.ls-mod-arrow { flex-shrink: 0; color: #444; }
.ls-mod-info { flex: 1; min-width: 0; }
.ls-mod-title {
  font-size: .8rem;
  font-weight: 700;
  color: #ccc;
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ls-mod-meta { font-size: .66rem; color: #444; margin-top: 2px; }
.ls-lessons-wrap { background: rgba(0,0,0,.15); }

/* Lesson items in sidebar */
.ls-lesson-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px 8px 14px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all .15s;
  border-top: 1px solid rgba(255,255,255,.02);
}
.ls-lesson-item:hover { background: rgba(255,255,255,.03); }
.ls-lesson-item.active {
  background: rgba(91,127,166,.1);
  border-left-color: var(--sl);
}
.ls-lesson-thumb {
  width: 72px; height: 44px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
  background: #1a1e26;
}
.ls-lesson-thumb-empty {
  width: 72px; height: 44px;
  border-radius: 4px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ls-lesson-info { flex: 1; min-width: 0; }
.ls-lesson-title {
  font-size: .78rem;
  color: #999;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ls-lesson-item.active .ls-lesson-title { color: #f0f0f0; }
.ls-lesson-meta {
  font-size: .65rem;
  color: #444;
  margin-top: 3px;
}
/* Mobile full-screen list */
.lesson-layout-mobile {
  display: block !important;
  height: auto !important;
  border-radius: 10px !important;
  min-height: unset !important;
}
.lesson-layout-mobile .lesson-sidebar {
  width: 100% !important;
  height: auto !important;
  border-right: none !important;
  border-radius: 10px !important;
  max-height: none !important;
  overflow-y: visible !important;
}
.lesson-layout-mobile .ls-lesson-item {
  padding: 10px 14px !important;
}
.lesson-layout-mobile .ls-lesson-thumb { width: 80px; height: 50px; }

/* Video player */
.lesson-player { display: flex; flex-direction: column; min-height: 100%; }
.lesson-video-wrap {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  flex-shrink: 0;
}
.lesson-video-wrap iframe { width: 100%; height: 100%; display: block; }
.lesson-no-video {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #0a0d12;
}
.lesson-info-panel { padding: 24px 28px; flex: 1; }
.lesson-breadcrumb { font-size: .68rem; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.lesson-title-big {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  color: #f0f0f0;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
  line-height: 1.2;
}
.lesson-desc-text { font-size: .84rem; color: #666; line-height: 1.7; margin-bottom: 18px; }
.lesson-task-box {
  background: rgba(201,168,76,.05);
  border: 1px solid rgba(201,168,76,.18);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 18px;
}
.lesson-task-label {
  display: flex; align-items: center; gap: 6px;
  font-size: .72rem; font-weight: 700;
  color: #c9a84c; letter-spacing: .5px;
  text-transform: uppercase; margin-bottom: 8px;
}
.lesson-task-text { font-size: .81rem; color: #9a9a9a; line-height: 1.6; }
.lesson-actions { display: flex; align-items: center; gap: 12px; padding-bottom: 30px; }
.lesson-done-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: .78rem; color: #4ade80;
  background: rgba(74,222,128,.08);
  border: 1px solid rgba(74,222,128,.2);
  padding: 8px 16px; border-radius: 8px;
}

/* Placeholder */
.lesson-placeholder {
  height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 300px;
}

/* Mobile */
@media(max-width:860px) {
  .lesson-layout { flex-direction: column; height: auto; min-height: unset; }
  .lesson-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--br); max-height: 45vh; }
  .lesson-main { min-height: 60vh; }
  .lesson-info-panel { padding: 16px; }
  .lesson-title-big { font-size: 1.2rem; }
}

@media(max-width:860px){
  .rec-view-toggle { display: none !important; }
  .admtab { padding: 8px 18px !important; font-size: .82rem !important; min-height: 38px; touch-action: pan-x; }
  .admtabs-wrap { top: 55px !important; }
}
.admtab{padding:7px 16px;border-radius:2px;border:1px solid var(--br);background:transparent;color:#555;font-family:sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.admtab.on{background:rgba(91,127,166,.11);border-color:var(--bs);color:var(--sl);}
.aform{background:var(--bc);border:1px solid var(--br);border-radius:14px;padding:20px;margin-bottom:16px;}
.ai{width:100%;padding:9px 11px;background:rgba(255,255,255,.05);border:1px solid var(--br);border-radius:2px;color:#f0f0f0;font-family:sans-serif;font-size:.82rem;outline:none;}
.ai:focus{border-color:var(--st);}
.ai option, .fi option {background:#1a1e26;color:#f0f0f0;}
.ai option:disabled, .fi option:disabled {color:#555;}
.al{display:block;font-size:.65rem;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.abtn2{background:var(--st);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;}
.dtab-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.dtab{width:100%;border-collapse:collapse;min-width:420px;}
.dtab th{text-align:left;padding:8px 11px;font-size:.68rem;color:#555;text-transform:uppercase;border-bottom:1px solid var(--br);}
.dtab td{padding:9px 11px;font-size:.8rem;color:#9a9a9a;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle;}
.toast2{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--bc);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:10px 16px;border-radius:2px;font-size:.8rem;transform:translateY(50px);opacity:0;transition:all .3s;pointer-events:none;}
.toast2.show{transform:translateY(0);opacity:1;}
.toast2.err{border-color:rgba(248,113,113,.3);color:#f87171;}

@media(max-width:860px){
  .aside{display:none;}
  .amain{padding:18px;padding-bottom:80px;}
  .alay{flex-direction:column;}
  #dash-top{grid-template-columns:1fr !important;}
  /* Collapse only exact 2-col grids, not the 3-col DOB grid */
  #amain [style*="grid-template-columns:1fr 1fr;"],
  #amain [style*="grid-template-columns:1fr 1fr "] { grid-template-columns:1fr !important; }
  .dob-grid { display:grid !important; grid-template-columns:1fr 1fr 1.4fr !important; }
  /* Fix date/datetime inputs overflowing on iOS */
  input[type="date"], input[type="datetime-local"] {
    width:100% !important; max-width:100% !important;
    box-sizing:border-box !important; min-width:0 !important;
    display:block !important;
  }
  /* Fix modals not going off screen */
  [style*="max-width:420px"], [style*="max-width:440px"], [style*="max-width:480px"] {
    max-width:calc(100vw - 32px) !important; box-sizing:border-box !important;
  }
  /* Programar modal step2 padding */
  #sch-step2 { padding:16px 16px 20px !important; }
}




/* ── MOBILE BOTTOM NAV ── */
.mob-nav{
  display:none !important;
  position:fixed;
  bottom:0;left:0;right:0;top:auto;
  height:58px;
  background:#181818;
  border-top:1px solid var(--br);
  border-bottom:none;
  z-index:700;
  justify-content:space-around;
  align-items:center;
}
.mob-nav-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;background:none;border:none;
  color:#555;font-size:.58rem;font-weight:500;
  letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;padding:4px 10px;
  transition:color .2s;
}
.mob-nav-btn svg{transition:stroke .2s;}
.mob-nav-btn.on{color:var(--sl);}
.mob-nav-btn.on svg{stroke:var(--sl);}
@media(max-width:860px){
  .mob-nav.visible{display:flex !important;}
  #appdash{padding-bottom:58px;}
}

/* ── METALLIC EFFECT ── */
.acard{
  background:linear-gradient(160deg,
    rgba(255,255,255,.06) 0%,

.acard::before{

  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),rgba(125,160,200,.3),rgba(255,255,255,.15),transparent);
}
.mc{
  background:linear-gradient(160deg,
    rgba(255,255,255,.04) 0%,
    rgba(91,127,166,.06) 40%,
    rgba(15,20,28,.85) 100%
  ) !important;

  ) !important;

.aside{

}
.admtab.on{

  box-shadow:0 1px 0 rgba(255,255,255,.12) inset, 0 -1px 0 rgba(0,0,0,.25) inset;
}

/* ── LANDING PAGE METALLIC ── */

/* Results / timeline items */
.mbox{
  background:linear-gradient(160deg,
    rgba(255,255,255,.04) 0%,
    rgba(91,127,166,.06) 40%,
    rgba(15,20,28,.9) 100%
  ) !important;
  border:1px solid rgba(91,127,166,.18) !important;
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 6px 18px rgba(0,0,0,.35) !important;
}

.mcard{
  background:linear-gradient(160deg,rgba(13,17,23,.99),rgba(15,20,28,.99)) !important;
  box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 30px 80px rgba(0,0,0,.7) !important;
}

/* Input fields */
.fi{
  background:rgba(255,255,255,.04) !important;
  border:1px solid rgba(91,127,166,.2) !important;
  transition:.2s !important;
}
.fi:focus{
  outline:none !important;
  border-color:rgba(91,127,166,.5) !important;
  box-shadow:0 0 0 3px rgba(91,127,166,.1) !important;
}

/* Modal main button (.mbtnn) */

/* ── BLUE TEXT GLOW ── */

/* Big numbers in dashboard cards */
.acard-v{
  text-shadow:0 0 16px rgba(125,160,200,.35) !important;
}

/* Mobile nav active */
.mob-nav-btn.on svg{
  filter:drop-shadow(0 0 4px rgba(125,160,200,.6)) !important;
}
.mob-nav-btn.on span{
  text-shadow:0 0 8px rgba(125,160,200,.5) !important;
}

/* Snav active sidebar */
.snav.on{
  text-shadow:0 0 10px rgba(125,160,200,.4) !important;
}
.snav.on svg{
  filter:drop-shadow(0 0 4px rgba(125,160,200,.5)) !important;
}

/* Fix action column alignment */
.dtab td:last-child { vertical-align:middle; }
.dtab td:last-child button { vertical-align:middle; }

/* ── ACTION DROPDOWN MENU ── */
.act-menu-item{display:block;width:100%;text-align:left;padding:9px 14px;background:none;border:none;color:#ccc;font-size:.79rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:.15s;white-space:nowrap;}
.act-menu-item:hover{background:rgba(91,127,166,.12);color:#fff;}
.act-menu-item:last-child{border-bottom:none;}
.act-menu-danger{color:#f87171 !important;}
.act-menu-danger:hover{background:rgba(248,113,113,.1) !important;}

/* Week card arrows - subtle on desktop, always visible on mobile */
.wk-arrow{ opacity:0 !important; }
.wk-card:hover .wk-arrow{ opacity:.6 !important; }
.wk-arrow:hover{ opacity:1 !important; color:#f0f0f0 !important; }

/* Equal height cards on mobile */
@media(max-width:860px){
  .wk-arrow{ opacity:.5 !important; }
  #dash-top{ grid-template-columns:1fr !important; gap:10px !important; }
  #dash-top .acard{ min-height:160px !important; height:160px !important; }
  #dash-top .wk-card{ min-height:160px !important; height:160px !important; }
  #card-week{ order:3 !important; }
  #card-1on1{ order:2 !important; }
}

/* Live pulse animation */
@keyframes live-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,158,255,.4); }
  50% { opacity: .6; box-shadow: 0 0 0 4px rgba(74,158,255,0); }
}

/* Session datetime grid */
.ses-dt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
  overflow: hidden;
}
.ses-dt-input {
  width: 100% !important;
  max-width: 100% !important;
  min-width: 0 !important;
  box-sizing: border-box !important;
  -webkit-appearance: none;
}
@media (max-width: 600px) {
  .ses-dt-grid {
    grid-template-columns: 1fr;
  }
}

/* iOS input zoom fix — font-size must be >= 16px to prevent auto-zoom */
@media(max-width:860px) {
  input, select, textarea,
  .fi, .ai, .fi:focus, .ai:focus {
    font-size: 16px !important;
  }
}

/* ── ECONOMIC CALENDAR ── */
.cal-day-group { margin-bottom: 22px; }
.cal-day-header {
  display: flex; align-items: center; gap: 10px;
  font-size: .65rem; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: #555;
  margin-bottom: 10px; padding-bottom: 7px;
  border-bottom: 1px solid var(--br);
}
.cal-day-header .cal-day-name { color: #9a9a9a; }
.cal-day-header .cal-day-today {
  background: rgba(91,127,166,.15); border: 1px solid rgba(91,127,166,.3);
  color: var(--sl); padding: 1px 9px; border-radius: 20px; font-size: .6rem;
}
/* Metallic card — matches dashboard acard style */
.cal-event {
  display: grid;
  grid-template-columns: 58px 52px 1fr auto;
  gap: 0 14px;
  align-items: center;
  background: linear-gradient(160deg,
    rgba(255,255,255,.05) 0%,
    rgba(91,127,166,.07) 40%,
    rgba(15,20,28,.88) 100%
  );
  border: 1px solid rgba(91,127,166,.18);
  border-left: 3px solid rgba(248,113,113,.7);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 8px;
  box-shadow: 0 1px 0 rgba(255,255,255,.05) inset, 0 4px 14px rgba(0,0,0,.35);
  transition: border-color .2s, background .2s, box-shadow .2s;
  cursor: pointer;
  position: relative;
}
.cal-event:hover {
  border-color: rgba(248,113,113,.4);
  box-shadow: 0 1px 0 rgba(255,255,255,.07) inset, 0 6px 20px rgba(0,0,0,.5);
}
.cal-event.cal-released { border-left-color: #f87171; }
.cal-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .9rem; font-weight: 700; color: #9a9a9a;
  white-space: nowrap; line-height: 1.2;
}
.cal-time.cal-soft { font-size: .65rem; color: #555; letter-spacing: .5px; text-transform: uppercase; }
.cal-flag-wrap {
  display: flex; align-items: center; justify-content: center;
}
.cal-flag { font-size: 1.7rem; line-height: 1; display:flex; align-items:center; justify-content:center; }
.cal-currency { display: none; }
.cal-name { font-size: .84rem; color: #e0e0e0; line-height: 1.35; font-weight: 600; }
.cal-values {
  display: flex; gap: 10px; align-items: center;
  flex-wrap: wrap; justify-content: flex-end;
}
.cal-val { text-align: center; min-width: 44px; }
.cal-val-label { font-size: .55rem; color: #444; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.cal-val-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .85rem; font-weight: 700; color: #666;
}
.cal-val-num.cal-actual { color: #f0f0f0; }
.cal-val-num.cal-actual.better { color: #4ade80; }
.cal-val-num.cal-actual.worse  { color: #f87171; }
.cal-val-num.cal-pending { color: #2a2a2a; }
.cal-values { min-width: 160px; }
.cal-impact-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .58rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; padding: 2px 8px; border-radius: 20px;
  background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.2);
  color: #f87171; white-space: nowrap; flex-shrink: 0;
}
@media(max-width:860px) {
  .cal-impact-text { display: none; }
  .cal-impact-badge { padding: 2px 4px; gap: 0; }
  .cal-values { justify-content: flex-end !important; margin-top: 6px; }
}
/* Explanation panel */
.cal-explain {
  display: none;
  grid-column: 1 / -1;
  margin-top: 10px;
  padding: 12px 14px;
  background: rgba(0,0,0,.25);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 8px;
  font-size: .78rem;
  line-height: 1.65;
  color: #9a9a9a;
}
.cal-explain.open { display: block; }
.cal-explain-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
.cal-explain-row:last-child { margin-bottom: 0; }
.cal-explain-icon { flex-shrink: 0; margin-top: 1px; }
.cal-explain strong { color: #f0f0f0; }
.cal-empty {
  text-align: center; padding: 32px; color: #444;
  font-size: .82rem; border: 1px dashed rgba(255,255,255,.06);
  border-radius: 10px;
}
.cal-error {
  background: rgba(248,113,113,.05); border: 1px solid rgba(248,113,113,.15);
  border-radius: 10px; padding: 16px; font-size: .82rem; color: #f87171;
  display: flex; align-items: center; gap: 10px;
}
@media(max-width:860px) {
  .cal-event { grid-template-columns: 48px 46px 1fr; grid-template-rows: auto auto; gap: 0 10px; }
  .cal-values { grid-column: 1 / -1; justify-content: flex-start; margin-top: 8px; }
}

/* Calendar mobile fixes */
@media(max-width:860px) {
  .cal-impact-text { display: none; }
  .cal-impact-badge { padding: 2px 5px; gap: 0; margin-top: 0; }

  /* Row 1: time + flag + name centered vertically */
  .cal-event {
    grid-template-columns: 44px 30px 1fr !important;
    grid-template-rows: auto auto !important;
    gap: 0 8px !important;
    padding: 10px 12px !important;
    align-items: center !important;
  }

  /* Row 2: values full width, horizontal, centered */
  .cal-values {
    grid-column: 1 / -1 !important;
    flex-direction: row !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 0 !important;
    margin-top: 8px !important;
    padding-top: 7px !important;
    border-top: 1px solid rgba(255,255,255,.05) !important;
    min-width: unset !important;
  }
  /* Each value takes equal width and centers its content */
  .cal-val {
    flex: 1 !important;
    text-align: center !important;
    min-width: unset !important;
    padding: 0 4px !important;
  }
  /* Subtle divider between values */
  .cal-val + .cal-val {
    border-left: 1px solid rgba(255,255,255,.06) !important;
  }
  .cal-val-label { font-size: .58rem !important; text-align: center !important; }
  .cal-val-num   { font-size: .82rem !important; text-align: center !important; }

  /* Align time and flag vertically centered */
  .cal-time { text-align: center !important; }
  .cal-flag-wrap { justify-content: center !important; }
}
</style>
</head>

function buildUrl(state) {
  var base = '/app/' + state.section;

    if (state.moduleId)  return base + '/m/' + state.moduleId;

function pushRoute(state, replace) {
  var url = buildUrl(state);
  if (replace) {

}

  if (!url) return '';
  url = url.trim();

  // YouTube
  var ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if (ytMatch) {
    return 'https://www.youtube.com/embed/' + ytMatch[1] + '?rel=0&modestbranding=1';
  }

  // Vimeo
  if (url.indexOf('vimeo.com') !== -1) {
    var vparts = url.split('/');
    var vid = vparts[vparts.length - 1].split('?')[0];
    if (vid) return 'https://player.vimeo.com/video/' + vid + '?byline=0&portrait=0&title=0';
  }

  // Bunny.net — already correct embed format
  if (url.indexOf('player.mediadelivery.net/embed') !== -1 ||
      url.indexOf('iframe.mediadelivery.net/embed') !== -1) {
    // Strip extra params and return clean URL
    return url.split('?')[0];
  }

  // Bunny.net — player.mediadelivery.net/play/LIB/ID → embed
  if (url.indexOf('mediadelivery.net/play') !== -1) {
    var parts = url.split('/');
    var videoId = parts[parts.length - 1].split('?')[0];
    var libId   = parts[parts.length - 2];
    if (libId && videoId) {
      return 'https://player.mediadelivery.net/embed/' + libId + '/' + videoId;
    }
  }

  // Bunny.net — bunny.net/play/LIB/ID
  if (url.indexOf('bunny.net') !== -1) {
    var parts2 = url.split('/');
    var videoId2 = parts2[parts2.length - 1].split('?')[0];
    var libId2   = parts2[parts2.length - 2];
    if (libId2 && videoId2) {
      return 'https://player.mediadelivery.net/embed/' + libId2 + '/' + videoId2;
    }
  }

  return '';
}


function _restoreAmain() {
  var am = document.getElementById('amain');
  if (am) { am.style.padding = ''; am.style.overflow = ''; }

  var mob = document.getElementById('mobile-player-overlay');
  if (mob) mob.remove();
}

function _renderSection(state) {
  _activateNav(state.section);
  // Reset scroll to top on every section change
  var appdash = document.getElementById('appdash');
  if (appdash) appdash.scrollTop = 0;
  // Always restore amain when navigating away from lesson layout
  if (state.section !== 'clases') _restoreAmain();
  if (state.section === 'dash')           rDash();
  else if (state.section === 'clases') {
    if (state.lessonId)       _restoreLesson(state);
    else if (state.moduleId)  _restoreModule(state);
    else if (state.levelId)   _restoreLevel(state);
    else                      rClases();
  }
  else if (state.section === 'sesiones')  rSes();
  else if (state.section === 'reuniones') rReun();
  else if (state.section === 'perfil')    rPerfil();
  else if (state.section === 'admin')     rAdmin();
}

function navigateTo(v) {
  var state = { section: v };
  pushRoute(state);
  _renderSection(state);
}

function _restoreLevel(state) {
  sb.from('course_levels').select('*, course_modules(id)').eq('id', state.levelId).single().then(function(r) {
    if (r.data) openLevel(r.data);
    else rClases();
  });
}

function _restoreModule(state) {
  sb.from('course_modules').select('*, course_levels(*)').eq('id', state.moduleId).single().then(function(r) {
    if (r.data && r.data.course_levels) {
      var level = r.data.course_levels;
      sb.from('course_lessons').select('id').eq('module_id', r.data.id).eq('is_published', true).then(function(li) {
        var lessonIds = (li.data || []).map(function(l){ return l.id; });
        if (!lessonIds.length) { showLessons(r.data, level, {}); return; }
        sb.from('lesson_progress').select('lesson_id').eq('user_id', cUser.id).eq('completed', true).in('lesson_id', lessonIds).then(function(pr) {
          var prog = {}; if (pr.data) pr.data.forEach(function(p){ prog[p.lesson_id]=true; });
          showLessons(r.data, level, prog);
        });
      });
    } else rClases();
  });
}

function _restoreLesson(state) {
  sb.from('course_lessons').select('*, course_modules(*, course_levels(*))').eq('id', state.lessonId).single().then(function(r) {
    if (!r.data || !r.data.course_modules) { rClases(); return; }
    var mod   = r.data.course_modules;
    var level = mod.course_levels;
    courseState.levelId  = level.id;
    courseState.moduleId = mod.id;
    courseState.lessonId = state.lessonId;
    showLessons(mod, level, {});
  });
}

function _parseUrlToState(path) {
  try {
    var stored = sessionStorage.getItem('spa_redirect');
    if (stored) { sessionStorage.removeItem('spa_redirect'); path = stored; }
  } catch(e) {}
  var m = path.match(/^\/app\/([^\/]+)(?:\/([^\/]+)\/([^\/]+))?/);
  if (!m) return { section: 'dash' };
  var section = m[1] || 'dash';
  var valid = ['dash','clases','sesiones','reuniones','perfil','admin'];
  if (valid.indexOf(section) === -1) return { section: 'dash' };
  var state = { section: section };
  if (section === 'clases' && m[2] && m[3]) {
    if (m[2] === 'l')  state.lessonId  = m[3];
    if (m[2] === 'm')  state.moduleId  = m[3];
    if (m[2] === 'lv') state.levelId   = m[3];
  }
  return state;
}

// popstate — browser back/forward
window.addEventListener('popstate', function(e) {
  var state = e.state;
  if (!state || !state.section) {
    window.location.href = '/login';
    return;
  }
  if (!cUser) {
    sb.auth.getSession().then(function(r) {
      if (r.data && r.data.session) loadApp(r.data.session.user);
      else window.location.href = '/login';
    });
    return;
  }
  _renderSection(state);
});

function loadApp(user) {
  cUser = user;
  var appdashEl = document.getElementById('appdash');
  // NO mostrar el dashboard hasta verificar acceso
  appdashEl.style.display = 'none';

  sb.from('profiles').select('*').eq('id', user.id).single().then(function(r) {
    cProfile = r.data;
    var name = cProfile && cProfile.full_name ? cProfile.full_name.split(' ')[0] : 'Alumno';
    document.getElementById('uname').textContent = name;
    if (cProfile && cProfile.role === 'admin') {
      document.getElementById('adm-lnk').style.display = 'block';
      var mobAdm = document.getElementById('mob-adm-btn');
      if (mobAdm) mobAdm.style.display = 'flex';
    }
    var mobNav = document.getElementById('mob-nav');
    if (mobNav) mobNav.classList.add('visible');

    // ── PURCHASE VERIFICATION ──
    // Admins bypass all checks
    if (cProfile && cProfile.role === 'admin') {
      _grantAccess();
      return;
    }

    // For regular users: verify purchase in Supabase before granting access
    sb.from('purchases')
      .select('id, status, created_at')
      .eq('user_id', user.id)
      .in('status', ['paid', 'active', 'completed'])
      .order('created_at', { ascending: false })
      .limit(1)
      .then(function(purchaseResult) {
        var hasPurchase = !purchaseResult.error &&
                          purchaseResult.data &&
                          purchaseResult.data.length > 0;

        if (hasPurchase) {
          // Valid purchase found → grant access
          _grantAccess();
        } else if (purchaseResult.error) {
          // Table doesn't exist or RLS error → fall back to membership_end check
          _checkMembershipFallback();
        } else {
          // No purchase record → fall back to membership_end check
          _checkMembershipFallback();
        }
      })
      .catch(function() {
        // Network or unexpected error → fall back gracefully
        _checkMembershipFallback();
      });

    function _checkMembershipFallback() {
      var now = new Date();
      var end = cProfile && cProfile.membership_end ? new Date(cProfile.membership_end) : null;
      // Sin membership_end o vencido → sin acceso
      if (!end || end <= now) {
        showPending();
        return;
      }
      _grantAccess();
    }

    function _grantAccess() {
      // Mostrar dashboard solo cuando el acceso está verificado
      var appdashEl = document.getElementById('appdash');
      appdashEl.style.display = 'block';
      appdashEl.scrollTop = 0;
      document.body.style.overflow = 'hidden';
      document.body.style.height = '100%';
      // Start auto session checker
      startSessionChecker();
      // Restore route from URL or start at dash
      var path = window.location.pathname;
      var routeState = _parseUrlToState(path);
      pushRoute(routeState, true);
      _renderSection(routeState);
    }
  });
}

var courseState = { levelId: null, moduleId: null, lessonId: null, progress: {} };

function rClases() {
  courseState = { levelId: null, moduleId: null, lessonId: null, progress: {} };
  showLevels();
}

function goToLastLesson() {
  _activateNav('clases');
  courseState = { levelId: null, moduleId: null, lessonId: null, progress: {} };

  var m = document.getElementById('amain');
  m.innerHTML = '<div style="padding:40px;text-align:center;color:#555;font-size:.83rem;"><span class="spin"></span> Cargando tu clase...</div>';

  // Get all published lessons with their module and level info, ordered
  sb.from('course_levels').select('*, course_modules(*, course_lessons(*))').eq('is_published', true).order('sort_order').then(function(lr) {
    if (!lr.data || !lr.data.length) { showLevels(); return; }

    // Flatten all lessons preserving level/module references
    var allLessons = [];
    lr.data.forEach(function(lv) {
      if (!lv.course_modules) return;
      var mods = lv.course_modules.slice().sort(function(a,b){ return (a.sort_order||0)-(b.sort_order||0); });
      mods.forEach(function(mod) {
        if (!mod.course_lessons) return;
        var lessons = mod.course_lessons.filter(function(l){ return l.is_published; }).sort(function(a,b){ return (a.sort_order||0)-(b.sort_order||0); });
        lessons.forEach(function(l) {
          allLessons.push({ lesson: l, mod: mod, level: lv });
        });
      });
    });

    if (!allLessons.length) { showLevels(); return; }

    // Get user lesson progress
    var lessonIds = allLessons.map(function(x){ return x.lesson.id; });
    sb.from('lesson_progress').select('lesson_id, completed').eq('user_id', cUser.id).in('lesson_id', lessonIds).then(function(pr) {
      var completedMap = {};
      if (pr.data) pr.data.forEach(function(p) { if (p.completed) completedMap[p.lesson_id] = true; });

      // Build progress object for showLessons
      var progress = completedMap;

      // Find target: first incomplete lesson; if all done, last lesson
      var target = allLessons.find(function(x){ return !completedMap[x.lesson.id]; });
      if (!target) target = allLessons[allLessons.length - 1];

      // Navigate: set state and open the module with that lesson
      courseState.levelId = target.level.id;
      courseState.moduleId = target.mod.id;
      openLevel(target.level);
    });
  });
}

function showLevels() {
  _restoreAmain();
  pushRoute({ section: 'clases' });
  var m = document.getElementById('amain');
  m.innerHTML = '<div class="atit">Curso Completo</div><div class="asub">Selecciona un módulo para comenzar</div><div id="lvl-grid" class="lvl-grid"><span class="spin"></span></div>';
  sb.from('course_levels').select('*, course_modules(id)').eq('is_published', true).order('sort_order').then(function(r) {

    if (!r.data || !r.data.length) { g.innerHTML = '<div class="empty-state">Sin contenido publicado aún.</div>'; return; }
    g.innerHTML = '';
    r.data.forEach(function(lv) {
      var card = document.createElement('div');
      card.className = 'lvl-card';
      var modCount = lv.course_modules ? lv.course_modules.length : 0;

function openLevel(level) {

  courseState.levelId = level.id;

  m.innerHTML = '<div style="padding:40px;text-align:center;"><span class="spin"></span></div>';

        lessonsDiv.className = 'ls-lessons-wrap';
        lessonsDiv.id = 'ls-lessons-' + module.id;
        lessonsDiv.style.display = (isCurrentMod || isMobile) ? 'block' : 'none';

        modHeader.addEventListener('click', function() {
          var open = lessonsDiv.style.display !== 'none';
          lessonsDiv.style.display = open ? 'none' : 'block';
          var arr = document.getElementById('ls-arr-' + module.id);
          if (arr) arr.querySelector('svg').style.transform = open ? '' : 'rotate(90deg)';
        });

        lessons.forEach(function(lesson, idx) {
          var done = prog[lesson.id];
          var thumbUrl = lesson.thumbnail_url || getThumb(lesson.video_url);
          var item = document.createElement('div');
          item.className = 'ls-lesson-item' + (done ? ' done' : '');
          item.id = 'li-' + lesson.id;
          item.innerHTML =
            (thumbUrl
              ? '<img src="' + thumbUrl + '" class="ls-lesson-thumb" onerror="this.style.display=\"none\"" />'
              : '<div class="ls-lesson-thumb ls-lesson-thumb-empty"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="rgba(255,255,255,.15)"/></svg></div>') +
            '<div class="ls-lesson-info">' +
              '<div class="ls-lesson-title">' + lesson.title + '</div>' +
              '<div class="ls-lesson-meta">' +
                (done ? '<span style="color:#4ade80;margin-right:3px;">✓</span>' : '') +
                (lesson.duration_minutes ? lesson.duration_minutes + ' min' : 'Video') +
                (lesson.has_task ? ' · Tarea' : '') +
              '</div>' +
            '</div>';

          (function(les, mod_ref) {
            item.addEventListener('click', function() {
              courseState.moduleId = mod_ref.id;
              if (isMobile) {
                openMobilePlayer(les, allLessonsFlat, prog, level, mod_ref);
              } else {
                playLesson(les, allLessonsFlat, prog);
              }
            });
          })(lesson, module);

          lessonsDiv.appendChild(item);
        });

        modSection.appendChild(modHeader);
        modSection.appendChild(lessonsDiv);
        list.appendChild(modSection);
      });

      // Desktop auto-play first incomplete lesson
      if (!isMobile && allLessonsFlat.length) {
        var target = allLessonsFlat.find(function(l){ return !prog[l.id]; }) || allLessonsFlat[0];
        if (mod) {
          var curMod = mr.data.find(function(mm){ return mm.id === mod.id; });
          if (curMod) {
            var ls = (curMod.course_lessons||[]).sort(function(a,b){ return (a.sort_order||0)-(b.sort_order||0); });
            var t = ls.find(function(l){ return !prog[l.id]; }) || ls[0];
            if (t) target = t;
          }
        }
        if (target) playLesson(target, allLessonsFlat, prog);
      }
    }

    if (allIds.length && cUser && cUser.id !== 'preview') {
      sb.from('lesson_progress').select('lesson_id').eq('user_id', cUser.id).eq('completed', true).in('lesson_id', allIds).then(function(pr) {
        var prog = {};
        if (pr.data) pr.data.forEach(function(p){ prog[p.lesson_id] = true; });
        buildSidebar(prog);
      });
    } else {
      buildSidebar(progress || {});
    }
  });
}

function openMobilePlayer(lesson, allLessons, progress, level, module) {
  courseState.lessonId = lesson.id;

  // Find current index in allLessons
  var idx = allLessons.findIndex(function(l){ return l.id === lesson.id; });
  var hasPrev = idx > 0;
  var hasNext = idx < allLessons.length - 1;
  var done = progress && progress[lesson.id];

  var embedUrl = toEmbedUrl(lesson.video_url || '');

  var existing = document.getElementById('mobile-player-overlay');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'mobile-player-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#0f1318;z-index:800;overflow-y:auto;padding-bottom:80px;';

  overlay.innerHTML =
    // ── Top bar ──
    '<div style="position:sticky;top:0;z-index:2;background:#0f1318;border-bottom:1px solid var(--br);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">' +
      '<button id="mob-player-back" style="background:none;border:none;color:#9a9a9a;display:flex;align-items:center;gap:5px;font-size:.82rem;cursor:pointer;padding:4px 0;">' +
        '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg> Lista' +
      '</button>' +
      '<div style="font-size:.68rem;color:#555;">' + (idx+1) + ' / ' + allLessons.length + '</div>' +
    '</div>' +

    // ── Video ──
    '<div style="width:100%;aspect-ratio:16/9;background:#000;">' +
      (embedUrl
        ? '<iframe src="' + embedUrl + '?rel=0&modestbranding=1" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;height:100%;display:block;"></iframe>'
        : '<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0d12;gap:10px;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><div style="color:#333;font-size:.8rem;">Video próximamente</div></div>') +
    '</div>' +

    // ── Info ──
    '<div style="padding:16px;">' +
      '<div style="font-size:.65rem;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">' + (module ? module.title : '') + '</div>' +
      '<div style="font-family:var(--font-cond,sans-serif);font-size:1.3rem;font-weight:800;color:#f0f0f0;text-transform:uppercase;margin-bottom:10px;line-height:1.2;">' + lesson.title + '</div>' +
      (lesson.description ? '<div style="font-size:.82rem;color:#666;line-height:1.7;margin-bottom:14px;">' + lesson.description + '</div>' : '') +
      (lesson.has_task && lesson.task_instructions
        ? '<div style="background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.18);border-radius:10px;padding:14px;margin-bottom:14px;">' +
            '<div style="font-size:.68rem;font-weight:700;color:#c9a84c;text-transform:uppercase;margin-bottom:6px;">📝 Tarea</div>' +
            '<div style="font-size:.8rem;color:#9a9a9a;line-height:1.6;">' + lesson.task_instructions + '</div>' +
            (!done ? '<textarea id="mob-task-input" class="ai" placeholder="Escribe tu respuesta..." rows="3" style="margin-top:10px;width:100%;box-sizing:border-box;font-size:16px;resize:vertical;"></textarea>' : '') +
          '</div>'
        : '') +

      // ── Action buttons ──
      '<div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">' +

        // Mark as done button
        '<div id="mob-done-wrap">' +
          (done
            ? '<div style="display:flex;align-items:center;justify-content:center;gap:8px;color:#4ade80;font-size:.84rem;padding:12px;border:1px solid rgba(74,222,128,.2);border-radius:8px;background:rgba(74,222,128,.05);">✓ Marcada como vista</div>'
            : '<button id="mob-btn-complete" class="abtn2" style="width:100%;padding:12px;font-size:.86rem;">✓ Marcar como vista</button>') +
        '</div>' +

        // Prev / Next buttons
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
          '<button id="mob-btn-prev" style="padding:11px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;' +
            (hasPrev ? 'background:rgba(91,127,166,.12);border:1px solid rgba(91,127,166,.25);color:var(--sl);' : 'background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#333;cursor:default;') +
            '">' + (hasPrev ? '← Anterior' : '← Anterior') + '</button>' +
          '<button id="mob-btn-next" style="padding:11px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;' +
            (hasNext ? 'background:rgba(91,127,166,.12);border:1px solid rgba(91,127,166,.25);color:var(--sl);' : 'background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#333;cursor:default;') +
            '">' + (hasNext ? 'Siguiente →' : 'Siguiente →') + '</button>' +
        '</div>' +

      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  // Back button
  document.getElementById('mob-player-back').addEventListener('click', function() {
    overlay.remove();
  });

  // Mark as done
  var btnC = document.getElementById('mob-btn-complete');
  if (btnC) btnC.addEventListener('click', function() {
    markDone(lesson.id, true);
    progress[lesson.id] = true;
    var wrap = document.getElementById('mob-done-wrap');
    if (wrap) wrap.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px;color:#4ade80;font-size:.84rem;padding:12px;border:1px solid rgba(74,222,128,.2);border-radius:8px;background:rgba(74,222,128,.05);">✓ Marcada como vista</div>';
    // Update sidebar item
    var li = document.getElementById('li-' + lesson.id);
    if (li) li.classList.add('done');
  });

  // Previous button
  var btnPrev = document.getElementById('mob-btn-prev');
  if (btnPrev && hasPrev) {
    btnPrev.addEventListener('click', function() {
      overlay.remove();
      openMobilePlayer(allLessons[idx-1], allLessons, progress, level, module);
    });
  }

  // Next button
  var btnNext = document.getElementById('mob-btn-next');
  if (btnNext && hasNext) {
    btnNext.addEventListener('click', function() {
      overlay.remove();
      openMobilePlayer(allLessons[idx+1], allLessons, progress, level, module);
    });
  }
}


function playLesson(lesson, allLessons, progress) {
  courseState.lessonId = lesson.id;
  pushRoute({ section: 'clases', levelId: courseState.levelId, moduleId: courseState.moduleId, lessonId: lesson.id });

  // Highlight active item in sidebar
  document.querySelectorAll('.ls-lesson-item, .lesson-item').forEach(function(el) { el.classList.remove('active'); });
  var li = document.getElementById('li-' + lesson.id);
  if (li) {
    li.classList.add('active');
    // Auto-expand the module section if collapsed
    var parent = li.parentElement;
    if (parent && parent.classList.contains('ls-lessons-wrap') && parent.style.display === 'none') {
      parent.style.display = 'block';
    }
    // Scroll sidebar item into view
    setTimeout(function() { li.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }, 100);
  }

  var main = document.getElementById('lesson-main'); if (!main) return;
  var done = progress && progress[lesson.id];

  // Fix YouTube URL
  var embedUrl = (lesson.video_url || '').trim();
  if (embedUrl) {
    embedUrl = embedUrl.replace('watch?v=', 'embed/').replace('youtu.be/', 'www.youtube.com/embed/');
    if (!embedUrl.includes('embed')) embedUrl = '';
  }

  main.innerHTML =
    '<div class="lesson-player">' +
      '<div class="lesson-video-wrap">' +
        (embedUrl
          ? '<iframe src="' + embedUrl + '?rel=0&modestbranding=1" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;height:100%;"></iframe>'
          : '<div class="lesson-no-video">' +
              '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>' +
              '<div style="color:#333;margin-top:10px;font-size:.8rem;">Video próximamente</div>' +
            '</div>') +
      '</div>' +
      '<div class="lesson-info-panel">' +
        '<div class="lesson-title-big">' + lesson.title + '</div>' +
        (lesson.description ? '<div class="lesson-desc-text">' + lesson.description + '</div>' : '') +
        (lesson.has_task && lesson.task_instructions
          ? '<div class="lesson-task-box">' +
              '<div class="lesson-task-label">' +
                '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>' +
                ' Tarea' +
              '</div>' +
              '<div class="lesson-task-text">' + lesson.task_instructions + '</div>' +
              (!done ? '<textarea id="task-input" class="ai" placeholder="Escribe tu respuesta o pega un link..." rows="3" style="margin-top:10px;width:100%;box-sizing:border-box;resize:vertical;font-size:16px;"></textarea>' : '') +
            '</div>'
          : '') +
        '<div class="lesson-actions">' +
          (!done
            ? '<button class="abtn2" id="btn-complete" style="padding:10px 22px;">✓ Marcar como completada</button>'
            : '<div class="lesson-done-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Completada</div>') +
        '</div>' +
      '</div>' +
    '</div>';

  var btnC = document.getElementById('btn-complete');
  if (btnC) btnC.addEventListener('click', function() { markDone(lesson.id); });
}

function markDone(lessonId, isMobile) {
  var taskInput = document.getElementById(isMobile ? 'mob-task-input' : 'task-input');
  var sub = taskInput ? taskInput.value.trim() : null;
  var btn = document.getElementById(isMobile ? 'mob-btn-complete' : 'btn-complete');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  sb.from('lesson_progress').upsert({ user_id: cUser.id, lesson_id: lessonId, completed: true, task_submission: sub, completed_at: new Date().toISOString() }).then(function(r) {
    if (r.error) { tst('Error al guardar', 1); if (btn) { btn.disabled = false; btn.textContent = 'Marcar como completada'; } return; }
    // Update sidebar item
    var li = document.getElementById('li-' + lessonId);
    if (li) {
      li.classList.add('done');
      var meta = li.querySelector('.ls-lesson-meta');
      if (meta) meta.innerHTML = '<span style="color:#4ade80;margin-right:3px;">✓</span>' + meta.textContent;
    }
    if (btn) btn.outerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px;color:#4ade80;font-size:.82rem;padding:12px;border:1px solid rgba(74,222,128,.2);border-radius:8px;background:rgba(74,222,128,.05);">✓ Completada</div>';
    tst('✓ Clase completada');
  });
}

// ── REUNIONES ──
function rReun() {
  var m = document.getElementById('amain');

  var now = new Date();

  // Load meetings and recordings in parallel
  Promise.all([
    sb.from('meetings_1on1').select('*').eq('student_id', cUser.id).order('scheduled_at'),
    sb.from('recordings_1on1').select('*').eq('student_id', cUser.id).order('recorded_at', {ascending: false})
  ]).then(function(res) {
    var meetings   = res[0].data || [];
    var recordings = res[1].data || [];

    var upcoming = meetings.filter(function(m){ return new Date(m.scheduled_at) >= new Date(now.getTime() - 1800000); });
    var past     = meetings.filter(function(m){ return new Date(m.scheduled_at) < new Date(now.getTime() - 1800000); });

    var html = '<div class="atit">Reuniones 1-1</div>';
    html += '<div class="asub" style="margin-bottom:24px;">Sesiones privadas con Jeisson</div>';

    if (upcoming.length) {
      var next = upcoming[0];
      var d = new Date(next.scheduled_at);
      var dateStr = d.toLocaleDateString("es-ES", {weekday:"long", day:"2-digit", month:"long", year:"numeric"});
      var timeStr = d.toLocaleTimeString("es-ES", {hour:"2-digit", minute:"2-digit"});

      // Countdown
      var diff = d - now;
      var days = Math.floor(diff / 86400000);

      html +=

      recordings.forEach(function(r) {
        var rd = new Date(r.recorded_at);

          '<div onclick="openRecModal(this.dataset.title,this.dataset.date,this.dataset.url)" ' +

// ── TOGGLE VISTA GRABADAS ──
function _applyRecView(prefix, v) {
  var list = document.getElementById(prefix+'-rec-list');
  var grid = document.getElementById(prefix+'-rec-grid');
  var btnL = document.getElementById(prefix+'-tog-list');
  var btnG = document.getElementById(prefix+'-tog-grid');
  if (!list || !grid) return;
  var isGrid = v === 'grid';
  list.style.display = isGrid ? 'none' : 'block';
  grid.style.display = isGrid ? 'grid' : 'none';
  if (btnL) { btnL.style.background = isGrid ? 'transparent' : 'rgba(91,127,166,.15)'; btnL.style.borderColor = isGrid ? 'rgba(255,255,255,.08)' : 'rgba(91,127,166,.3)'; btnL.style.color = isGrid ? '#555' : 'var(--sl)'; }
  if (btnG) { btnG.style.background = isGrid ? 'rgba(91,127,166,.15)' : 'transparent'; btnG.style.borderColor = isGrid ? 'rgba(91,127,166,.3)' : 'rgba(255,255,255,.08)'; btnG.style.color = isGrid ? 'var(--sl)' : '#555'; }
}
function setSesView(v) {
  try { localStorage.setItem('mrk_sesview', v); } catch(e){}
  _applyRecView('ses', v);
}
function setReuView(v) {
  try { localStorage.setItem('mrk_reuview', v); } catch(e){}
  _applyRecView('reu', v);
}
// Called after rSes / rReun render to restore saved preference
function restoreSesView() {
  var v = 'list'; try { v = localStorage.getItem('mrk_sesview') || 'list'; } catch(e){}
  _applyRecView('ses', v);
}
function restoreReuView() {
  var v = 'list'; try { v = localStorage.getItem('mrk_reuview') || 'list'; } catch(e){}
  _applyRecView('reu', v);
}

function savePerfil() {
  var name   = (document.getElementById('pf-name')         ||{}).value.trim();
  var dobD  = (document.getElementById('pf-dob-d')||{}).value || '';
  var dobM  = (document.getElementById('pf-dob-m')||{}).value || '';
  var dobY  = (document.getElementById('pf-dob-y')||{}).value || '';
  var dob   = (dobD && dobM && dobY) ? dobY+'-'+dobM+'-'+dobD : null;
  var country= (document.getElementById('pf-country')      ||{}).value.trim();
  var prefix = (document.getElementById('pf-phone-prefix') ||{}).value || '+593';
  var phone  = (document.getElementById('pf-phone')        ||{}).value.trim();
  var exp    = (document.getElementById('pf-exp')          ||{}).value;
  var bio    = (document.getElementById('pf-bio')          ||{}).value.trim();
  if (!name) return tst('El nombre es requerido', 1);

  // Calculate age from dob
  var age = null;
  if (dob) {
    var today = new Date(), birth = new Date(dob);
    age = today.getFullYear() - birth.getFullYear();
    if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
  }

  var update = {
    full_name:          name,
    date_of_birth:      dob,
    age:                age,
    country:            country,
    phone_prefix:       prefix,
    phone:              phone,
    trading_experience: exp,
    bio:                bio
  };
  sb.from('profiles').update(update).eq('id', cUser.id).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    cProfile = Object.assign(cProfile || {}, update);
    document.getElementById('uname').textContent = (name || '').split(' ')[0] || 'Alumno';
    tst('✓ Perfil actualizado');
    rPerfil();
  });
}

function savePw() {
  var pw1 = document.getElementById('pf-pw1').value;
  var pw2 = document.getElementById('pf-pw2').value;
  if (!pw1) return tst('Ingresa una contraseña', 1);
  if (pw1.length < 6) return tst('Mínimo 6 caracteres', 1);
  if (pw1 !== pw2) return tst('Las contraseñas no coinciden', 1);
  sb.auth.updateUser({ password: pw1 }).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst('✓ Contraseña actualizada');
    document.getElementById('pf-pw1').value = '';
    document.getElementById('pf-pw2').value = '';
  });
}

function saveEmail() {

async function uploadAvatar(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  if (file.size > 3 * 1024 * 1024) return tst('Imagen máximo 3MB', 1);

  // Show uploading state
  var wrap = document.getElementById('avatar-wrap');
  if (wrap) wrap.style.opacity = '0.5';
  tst('Subiendo foto...');

  // Compress image before upload using canvas
  var img = new Image();
  var reader = new FileReader();
  reader.onload = function(e) {
    img.onload = async function() {
      // Resize to max 400x400
      var canvas = document.createElement('canvas');
      var MAX = 400;
      var w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else        { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);

      canvas.toBlob(async function(blob) {
        var path = cUser.id + '/avatar.jpg';

        // Upload to Storage
        var up = await sb.storage.from('avatars').upload(path, blob, {
          contentType: 'image/jpeg',
          upsert: true
        });

        if (up.error) {
          if (wrap) wrap.style.opacity = '1';
          return tst('Error al subir: ' + up.error.message, 1);
        }

        // Get public URL
        var publicUrl = sb.storage.from('avatars').getPublicUrl(path).data.publicUrl;
        // Add cache buster so browser doesn't show old photo
        publicUrl = publicUrl + '?t=' + Date.now();

        // Save URL to profile (tiny string, not base64)
        var upd = await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', cUser.id);
        if (upd.error) {
          if (wrap) wrap.style.opacity = '1';
          return tst('Error al guardar: ' + upd.error.message, 1);
        }

        cProfile.avatar_url = publicUrl;
        if (wrap) wrap.style.opacity = '1';
        tst('✓ Foto actualizada');
        rPerfil();
      }, 'image/jpeg', 0.85);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

            (isAdmin ?
              '<textarea id="week-note-input" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.04);border:1px solid var(--br);color:#f0f0f0;border-radius:6px;padding:8px 10px;font-size:.8rem;resize:vertical;min-height:70px;" placeholder="Agregar nota para este alumno en esta semana...">'+note+'</textarea>' +
              '<button onclick="saveWeekNote('+weekNum+',\''+sid+'\')" style="margin-top:8px;background:var(--st);border:none;color:#fff;padding:7px 14px;border-radius:6px;font-size:.76rem;font-weight:600;cursor:pointer;">Guardar nota</button>'
            :
              '<div style="font-size:.82rem;color:'+(note?'#ccc':'#444')+';">'+( note || 'Sin notas para esta semana.')+'</div>'
            ) +
          '</div>' +
        '</div>';

      ov.appendChild(box);
      document.body.appendChild(ov);
    });
  });
}

function saveWeekNote(weekNum, studentId) {
  var inp = document.getElementById('week-note-input');
  if (!inp) return;
  var note = inp.value.trim();
  sb.from('student_week_notes').upsert({
    student_id: studentId,
    week_number: weekNum,
    note: note,
    created_by: cUser.id
  }, { onConflict: 'student_id,week_number' }).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst('✓ Nota guardada');
  });
}

// Admin roadmap editor
function rAdmRoadmap() {
  var c = document.getElementById('a-roadmap'); if (!c) return;

  sb.from('roadmap_weeks').select('*').order('week_number').then(function(r) {
    var existing = {};
    if (r.data) r.data.forEach(function(w) { existing[w.week_number] = w; });

      cell.innerHTML =
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:1.1rem;font-weight:800;color:'+(w?'var(--sl)':'#333')+';">'+i+'</div>' +
        '<div style="font-size:.6rem;color:#555;margin-top:2px;">'+(w?'✓ Listo':'Vacía')+'</div>';
      cell.onmouseover = function(){ this.style.borderColor='var(--sl)'; };
      cell.onmouseout = function(){ this.style.borderColor=(this.dataset.has==='1'?'rgba(91,127,166,.25)':'var(--br)'); };

function editRoadmapWeek(weekNum, existing) {
  var acts = existing && Array.isArray(existing.activities) ? existing.activities : (existing ? JSON.parse(existing.activities||'[]') : []);
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px;';
  ov.onclick = function(e){ if(e.target===ov) ov.remove(); };

  box.style.cssText = 'background:#1a1a1a;border:1px solid var(--bs);border-radius:16px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;';
  box.innerHTML =
    '<div style="padding:18px 22px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;align-items:center;">' +
      '<div style="font-weight:700;font-size:.95rem;">Editar Semana '+weekNum+'</div>' +
      '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;color:#555;font-size:1.3rem;cursor:pointer;">✕</button>' +
    '</div>' +
    '<div style="padding:20px 22px;">' +
      '<div style="margin-bottom:12px;"><label class="al">Título de la semana</label><input id="rw-title" class="ai" value="'+(existing?existing.title:'')+'" placeholder="Ej: Fundamentos del mercado"></div>' +
      '<div style="margin-bottom:12px;"><label class="al">Objetivo</label><textarea id="rw-obj" class="ai" rows="2" style="width:100%;box-sizing:border-box;resize:vertical;" placeholder="¿Qué debe lograr el alumno esta semana?">'+(existing?existing.objective:'')+'</textarea></div>' +
      '<div style="margin-bottom:14px;">' +
        '<label class="al">Actividades (una por línea)</label>' +
        '<textarea id="rw-acts" class="ai" rows="5" style="width:100%;box-sizing:border-box;resize:vertical;" placeholder="Actividad 1&#10;Actividad 2&#10;Tarea: ...">' + acts.join('\n') + '</textarea>' +
      '</div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="saveRoadmapWeek('+weekNum+')" class="abtn2" style="flex:1;">Guardar semana</button>' +
        (existing ? '<button onclick="deleteRoadmapWeek('+weekNum+')" style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:#f87171;padding:8px 14px;border-radius:6px;font-size:.78rem;cursor:pointer;">Eliminar</button>' : '') +
      '</div>' +
    '</div>';
  ov.appendChild(box);
  document.body.appendChild(ov);

function saveRoadmapWeek(weekNum) {
  var title = document.getElementById('rw-title').value.trim();
  var obj = document.getElementById('rw-obj').value.trim();
  var actsRaw = document.getElementById('rw-acts').value.trim();
  var acts = actsRaw ? actsRaw.split('\n').map(function(a){return a.trim();}).filter(Boolean) : [];
  if (!title) return tst('El título es requerido', 1);
  sb.from('roadmap_weeks').upsert({
    week_number: weekNum, title: title, objective: obj, activities: JSON.stringify(acts)
  }, { onConflict: 'week_number' }).then(function(r) {
    if (r.error) return tst('Error: ' + r.error.message, 1);
    tst('✓ Semana ' + weekNum + ' guardada');
    var ov = document.querySelector('div[style*="z-index:900"]'); if (ov) ov.remove();
    rAdmRoadmap();
  });
}

function deleteRoadmapWeek(weekNum) {
  if (!confirm('¿Eliminar el contenido de la semana ' + weekNum + '?')) return;
  sb.from('roadmap_weeks').delete().eq('week_number', weekNum).then(function(r) {
    if (r.error) return tst('Error', 1);
    tst('✓ Semana eliminada');
    var ov = document.querySelector('div[style*="z-index:900"]'); if (ov) ov.remove();
    rAdmRoadmap();
  });
}

    var active = t === tab;

function _rAdm1on1Mtg() {
  var el = document.getElementById('a1on1-mtg'); if (!el) return;
  el.innerHTML = '<div style="padding:20px 0;text-align:center;"><span class="spin"></span></div>';
  var now = new Date().toISOString();
  sb.from('meetings_1on1')
    .select('*, profiles(full_name, avatar_url)')
    .gte('scheduled_at', now)
    .order('scheduled_at')
    .then(function(r) {
      var data = r.data || [];
      if (!data.length) {
        el.innerHTML = '<div style="background:linear-gradient(160deg,rgba(255,255,255,.04) 0%,rgba(30,40,55,.95) 50%,rgba(91,127,166,.04) 100%);border:1px dashed rgba(91,127,166,.18);border-radius:10px;padding:30px;text-align:center;color:#444;font-size:.84rem;">No hay reuniones 1-1 próximas programadas.</div>';
        return;
      }
      var byDate = {};
      data.forEach(function(m) {
        var d = new Date(m.scheduled_at);
        var key = d.toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
        if (!byDate[key]) byDate[key] = [];
        byDate[key].push(m);
      });
      var html = '';
      Object.keys(byDate).forEach(function(dateLabel) {
        html += '<div style="margin-bottom:18px;">';
        html += '<div style="font-size:.65rem;color:var(--sl);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(91,127,166,.12);">' + dateLabel + '</div>';
        byDate[dateLabel].forEach(function(m) {
          var d = new Date(m.scheduled_at);
          var timeStr = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
          var now2 = new Date();
          var diff = d - now2;
          var dDays = Math.floor(diff / 86400000);
          var dHrs  = Math.floor((diff % 86400000) / 3600000);
          var dMins = Math.floor((diff % 3600000) / 60000);
          var countdown = dDays > 0 ? dDays + 'd ' + dHrs + 'h' : dHrs + 'h ' + dMins + 'm';
          var name = (m.profiles && m.profiles.full_name) ? m.profiles.full_name : 'Alumno';
          var initials = name.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
          var isFuture10 = diff < 600000 && diff > 0;
          html +=
            '<div style="background:linear-gradient(160deg,rgba(255,255,255,.05) 0%,rgba(91,127,166,.07) 30%,rgba(15,20,28,.92) 60%,rgba(91,127,166,.04) 100%);border:1px solid rgba(91,127,166,.2);box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 4px 16px rgba(0,0,0,.35);border-radius:12px;padding:14px 16px;margin-bottom:7px;display:flex;align-items:center;gap:14px;" >' +
              '<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--st),var(--sl));display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff;flex-shrink:0;">' + initials + '</div>' +
              '<div style="flex:1;min-width:0;">' +
                '<div style="font-size:.88rem;font-weight:600;color:#f0f0f0;">' + name + '</div>' +
                '<div style="font-size:.75rem;color:#555;margin-top:2px;">' + (m.title || 'Sesión 1-1') + '</div>' +
              '</div>' +
              '<div style="text-align:right;flex-shrink:0;">' +
                '<div style="font-size:.85rem;font-weight:600;color:var(--sl);">' + timeStr + '</div>' +
                '<div style="font-size:.68rem;color:' + (isFuture10 ? '#f87171' : '#555') + ';margin-top:2px;">En ' + countdown + '</div>' +
              '</div>' +
              (m.meet_url ? '<a href="' + m.meet_url + '" target="_blank" rel="noopener" style="flex-shrink:0;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80;padding:5px 12px;border-radius:6px;font-size:.72rem;font-weight:600;text-decoration:none;white-space:nowrap;">Entrar</a>' : '<span style="flex-shrink:0;font-size:.72rem;color:#333;padding:5px 10px;">Sin link</span>') +
              '<div style="display:flex;gap:4px;margin-left:6px;flex-shrink:0;">' +
                '<button onclick="openEditMtgModal(\'' + m.id + '\',\'' + encodeURIComponent(m.title||'Sesión 1-1') + '\',\'' + encodeURIComponent(m.meet_url||'') + '\',\'' + m.scheduled_at + '\')" style="background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);color:#c9a84c;width:28px;height:28px;border-radius:6px;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;" title="Editar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
                '<button onclick="delAdmMtg(\'' + m.id + '\')" style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);color:#f87171;width:28px;height:28px;border-radius:6px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;" title="Eliminar">✕</button>' +
              '</div>' +
            '</div>';
        });
        html += '</div>';
      });
      html += '<div style="font-size:.68rem;color:#333;padding-top:4px;text-align:right;">' + data.length + ' reunión' + (data.length !== 1 ? 'es' : '') + ' próxima' + (data.length !== 1 ? 's' : '') + '</div>';
      el.innerHTML = html;
    });
}

      // Header

function _renderSchModalList(students) {
  var listEl = document.getElementById('sch-modal-list'); if (!listEl) return;
  if (!students.length) { listEl.innerHTML = '<div style="padding:20px;text-align:center;color:#555;font-size:.8rem;">Sin resultados</div>'; return; }
  listEl.innerHTML = students.map(function(s) {
    var initials = (s.full_name||'?').split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
    var active = s.membership_end && new Date(s.membership_end) > new Date();
    return '<div onclick="schSelectStudent(\'' + s.id + '\',\'' + encodeURIComponent(s.full_name||'Alumno') + '\',' + active + ')" ' +
      'style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:5px;cursor:pointer;border:1px solid transparent;transition:background .12s,border-color .12s;" ' +
      'onmouseover="this.style.background=\'rgba(91,127,166,.08)\';this.style.borderColor=\'rgba(91,127,166,.2)\'" ' +
      'onmouseout="this.style.background=\'transparent\';this.style.borderColor=\'transparent\'">' +
      '<div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--st),var(--sl));display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;color:#fff;flex-shrink:0;">' + initials + '</div>' +
      '<div style="flex:1;">' +
        '<div style="font-size:.85rem;font-weight:600;color:#f0f0f0;">' + (s.full_name||'Sin nombre') + '</div>' +
        '<div style="font-size:.68rem;margin-top:1px;color:' + (active?'#4ade80':'#555') + ';">' + (active?'● Activo':'○ Inactivo') + '</div>' +
      '</div>' +
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>' +
    '</div>';
  }).join('');
}

function filterSchModal(q) {
  var term = (q||'').toLowerCase().trim();
  var all = window._schModalStudents || [];
  _renderSchModalList(term ? all.filter(function(s){ return (s.full_name||'').toLowerCase().indexOf(term) !== -1; }) : all);
}

function schSelectStudent(id, encName, active) {
  window._schSelectedId = id;
  var name = decodeURIComponent(encName);
  var initials = name.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();

function filterRecStudents(q) {
  var term = (q||'').toLowerCase().trim();
  var cards = document.querySelectorAll('.rec-stu-card');
  var any = false;
  cards.forEach(function(card) {
    var name = card.getAttribute('data-name') || '';
    var show = !term || name.indexOf(term) !== -1;
    card.style.display = show ? 'block' : 'none';
    if (show) any = true;
  });
  // Show/hide empty state
  var empty = document.getElementById('rec-stu-empty');
  if (!empty && !any) {
    var list = document.getElementById('rec-stu-list');
    if (list) {
      var d = document.createElement('div');
      d.id = 'rec-stu-empty';
      d.style.cssText = 'text-align:center;padding:20px;font-size:.8rem;color:#444;';
      d.textContent = 'Sin resultados para "' + q + '"';
      list.appendChild(d);
    }
  } else if (empty && any) {
    empty.remove();
  } else if (empty && !any) {
    empty.textContent = 'Sin resultados para "' + q + '"';
  }
}

function toggleRecStudent(uid) {
  var el = document.getElementById(uid);
  var arrow = document.getElementById(uid + '-arrow');
  if (!el) return;
  var open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if (arrow) arrow.style.transform = open ? '' : 'rotate(180deg)';
}

function saveSchedule(studentId) {
  var title = (document.getElementById('sch-title')||{}).value || 'Sesión 1-1';
  var date  = (document.getElementById('sch-date') ||{}).value || '';
  var time  = (document.getElementById('sch-time') ||{}).value || '00:00';
  var url   = (document.getElementById('sch-url')  ||{}).value || '';
  if (!date) return tst('Selecciona una fecha', 1);
  var btn = document.getElementById('sch-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
  sb.from('meetings_1on1').insert({
    student_id:   studentId,
    scheduled_at: new Date(date + 'T' + time).toISOString(),
    title:        title.trim(),
    meet_url:     url.trim() || null,

  }).then(function(r) {
    if (r.error) { tst('Error: '+r.error.message, 1); if(btn){btn.disabled=false;btn.textContent='Programar sesión';} return; }
    tst('✓ Sesión programada');
    var m = document.getElementById('schedule-modal');
    if (m) m.remove();
  });
}
